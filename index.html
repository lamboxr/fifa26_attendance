<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🇦🇷 阿根廷 · 观赛晋级</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #6CB4EE 0%, #D6EAF8 50%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3.5vh 3.5vw;
            position: relative;
        }

        /* 球衣条纹装饰（柔和） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.06) 0px,
                    rgba(255, 255, 255, 0.06) 6vw,
                    rgba(108, 180, 238, 0.04) 6vw,
                    rgba(108, 180, 238, 0.04) 12vw);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 主容器 — 留白更多 ===== */
        #app {
            width: 88vw;
            max-width: 88vw;
            height: 85vh;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 2.4vw;
            padding: 2.8vh 3.2vw 2.8vh;
            box-shadow: 0 2.5vh 7vh rgba(0, 40, 80, 0.18), 0 0 0 0.15vw rgba(108, 180, 238, 0.12);
            border: 0.12vw solid rgba(255, 255, 255, 0.25);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.8vh;
            padding-bottom: 0.6vh;
            border-bottom: 0.15vw solid rgba(108, 180, 238, 0.20);
            flex-shrink: 0;
        }

        .logo h1 {
            font-size: 2.2vw;
            font-weight: 800;
            color: #1A3A5C;
            display: flex;
            align-items: center;
            gap: 0.6vw;
            letter-spacing: 0.04vw;
            line-height: 1.2;
        }
        .logo h1 .flag {
            font-size: 2.6vw;
        }
        .logo .sub {
            font-size: 1.0vw;
            color: #4A7A9C;
            letter-spacing: 0.2vw;
            margin-top: 0.1vh;
            font-weight: 500;
            font-style: italic;
        }

        .round-badge {
            display: flex;
            align-items: center;
            gap: 1.2vw;
            background: rgba(108, 180, 238, 0.10);
            padding: 0.4vh 1.8vw 0.4vh 2.0vw;
            border-radius: 4vw;
            border: 0.10vw solid rgba(108, 180, 238, 0.18);
            font-size: 0.95vw;
            flex-shrink: 0;
        }
        .round-badge .label {
            color: #1A3A5C;
            font-weight: 600;
            letter-spacing: 0.08vw;
        }
        .round-badge .round-num {
            font-size: 2.2vw;
            font-weight: 800;
            color: #1A3A5C;
            min-width: 2.2vw;
            text-align: center;
            transition: 0.3s;
        }
        .round-badge .round-num.active {
            color: #2E86C1;
            text-shadow: 0 0 1.8vw rgba(46, 134, 193, 0.20);
        }
        .round-badge .total {
            color: #4A7A9C;
            font-size: 1.2vw;
            font-weight: 500;
        }
        .round-badge .people-count {
            color: #1A3A5C;
            font-size: 1.1vw;
            background: rgba(108, 180, 238, 0.12);
            padding: 0.15vh 1.0vw;
            border-radius: 2.2vw;
            font-weight: 600;
            margin-left: 0.2vw;
        }

        /* ===== 统计条 ===== */
        .stats-bar {
            display: flex;
            gap: 1.8vw;
            margin-bottom: 0.8vh;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.35);
            padding: 0.25vh 1.2vw;
            border-radius: 1.4vw;
            backdrop-filter: blur(4px);
            border: 0.08vw solid rgba(108, 180, 238, 0.08);
            flex-shrink: 0;
            font-size: 0.95vw;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4vw;
            color: #1A3A5C;
            font-weight: 500;
        }
        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 1.5vw;
            color: #1A3A5C;
            min-width: 1.6vw;
            text-align: center;
        }
        .stats-bar .stat-item .num.qualify-num {
            color: #2E86C1;
        }
        .stats-bar .stat-item .num.eliminate-num {
            color: #E74C3C;
        }
        .stats-bar .stat-divider {
            width: 0.08vw;
            background: rgba(108, 180, 238, 0.12);
        }

        /* ===== 名字网格 — 核心区域 ===== */
        #nameGrid {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            padding: 1.0vh 0.8vw 0.8vh;
            border-radius: 1.6vw;
            background: rgba(255, 255, 255, 0.10);
            border: 0.08vw solid rgba(108, 180, 238, 0.04);
            overflow: hidden;
        }

        /* ===== 名字卡片 — 完全自适应宽度 ===== */
        .name-card {
            position: absolute;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5vh 1.4vw;
            height: 4.2vh;
            min-height: 32px;
            border-radius: 1.0vw;
            background: rgba(255, 255, 255, 0.88);
            border: 0.12vw solid rgba(108, 180, 238, 0.28);
            color: #1A3A5C;
            font-size: 1.5vw;
            font-weight: 500;
            transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.4s ease,
                background 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease,
                opacity 0.5s ease;
            cursor: default;
            user-select: none;
            box-shadow: 0 0.15vw 0.8vw rgba(0, 40, 80, 0.05);
            white-space: nowrap;
            z-index: 1;
            will-change: left, top, transform;
            letter-spacing: 0.04vw;
            width: auto;
            max-width: none;
            overflow: visible;
            text-overflow: clip;
        }

        .name-card:hover {
            transform: scale(1.08) rotate(0deg) !important;
            border-color: #2E86C1;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 0.6vw 2.4vw rgba(46, 134, 193, 0.16);
            z-index: 100;
        }

        /* ---- 晋级 ---- */
        .name-card.qualify {
            background: rgba(46, 134, 193, 0.12);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 2.0vw rgba(46, 134, 193, 0.10), inset 0 0 1.6vw rgba(46, 134, 193, 0.04);
            animation: qualifyPulse 1.2s ease-in-out;
            z-index: 10;
        }
        @keyframes qualifyPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            30% {
                transform: scale(1.10);
                box-shadow: 0 0 4vw rgba(46, 134, 193, 0.28);
                border-color: #2E86C1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 2.0vw rgba(46, 134, 193, 0.10);
            }
        }
        .name-card.qualify .check-mark {
            display: inline-block;
            margin-left: 0.35vw;
            font-size: 1.0vw;
            color: #2E86C1;
        }

        /* ---- 淘汰 ---- */
        .name-card.eliminate {
            background: rgba(231, 76, 60, 0.07);
            border-color: rgba(231, 76, 60, 0.20);
            color: #C0392B;
            animation: eliminateFade 0.9s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes eliminateFade {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(231, 76, 60, 0.07);
            }
            40% {
                transform: scale(0.78);
                opacity: 0.7;
                background: rgba(231, 76, 60, 0.16);
            }
            100% {
                transform: scale(0.30) translateY(5vh);
                opacity: 0;
                background: rgba(231, 76, 60, 0);
                border-color: transparent;
            }
        }

        /* ---- 回归 ---- */
        .name-card.reappear {
            animation: reappearUp 0.8s ease-out forwards;
            z-index: 8;
        }
        @keyframes reappearUp {
            0% {
                transform: translateY(6vh) scale(0.50);
                opacity: 0;
                background: rgba(46, 134, 193, 0.04);
            }
            60% {
                transform: translateY(-0.4vh) scale(1.04);
                opacity: 1;
                background: rgba(46, 134, 193, 0.10);
                border-color: rgba(46, 134, 193, 0.28);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                background: rgba(255, 255, 255, 0.88);
                border-color: rgba(108, 180, 238, 0.28);
                color: #1A3A5C;
            }
        }

        /* ---- 晋级高亮（蓝光） ---- */
        .name-card.qualify-glow {
            background: rgba(46, 134, 193, 0.18);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 4.5vw rgba(46, 134, 193, 0.20), inset 0 0 2.5vw rgba(46, 134, 193, 0.06);
            animation: glowBlue 1.5s ease-in-out;
            z-index: 20;
        }
        @keyframes glowBlue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            25% {
                transform: scale(1.14);
                box-shadow: 0 0 7vw rgba(46, 134, 193, 0.38);
            }
            60% {
                transform: scale(0.94);
                box-shadow: 0 0 3vw rgba(46, 134, 193, 0.14);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 4.5vw rgba(46, 134, 193, 0.10);
            }
        }

        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4A7A9C;
            font-size: 2.0vw;
            letter-spacing: 0.2vw;
        }

        /* ===== 底部无任何按钮 ===== */
        footer {
            display: none;
        }

        /* ===== 工具类 ===== */
        .stat-item .num.pop {
            animation: popNum 0.5s ease;
        }
        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.35);
                color: #2E86C1;
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== 滚动条完全隐藏 ===== */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* ===== 响应式（保持大屏优先，小屏兼容） ===== */
        @media (max-width: 1200px) {
            #app {
                width: 90vw;
                height: 88vh;
                padding: 2.0vh 2.4vw;
            }
            .logo h1 {
                font-size: 2.6vw;
            }
            .name-card {
                font-size: 1.8vw;
                height: 4.0vh;
                padding: 0.4vh 1.2vw;
            }
            .logo .sub {
                font-size: 1.1vw;
            }
        }

        @media (max-width: 768px) {
            #app {
                width: 94vw;
                height: auto;
                min-height: 82vh;
                padding: 1.4vh 2.0vw 1.4vh;
                border-radius: 3vw;
            }
            .logo h1 {
                font-size: 3.4vw;
            }
            .logo .sub {
                font-size: 1.6vw;
            }
            .round-badge {
                font-size: 1.4vw;
                padding: 0.3vh 1.6vw;
                gap: 0.8vw;
            }
            .round-badge .round-num {
                font-size: 3.0vw;
                min-width: 2.8vw;
            }
            .stats-bar {
                font-size: 1.4vw;
                gap: 1.2vw;
                padding: 0.2vh 1.0vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.0vw;
            }
            .name-card {
                font-size: 2.2vw;
                height: 3.6vh;
                padding: 0.2vh 1.0vw;
                border-radius: 1.2vw;
                min-height: 26px;
            }
            #nameGrid {
                padding: 0.8vh 0.6vw;
                min-height: 200px;
            }
        }

        @media (max-width: 480px) {
            #app {
                padding: 0.8vh 1.2vw 0.8vh;
                border-radius: 2.5vw;
            }
            .logo h1 {
                font-size: 4.2vw;
                flex-wrap: wrap;
            }
            .logo .sub {
                font-size: 2.0vw;
            }
            .round-badge {
                font-size: 1.8vw;
                padding: 0.2vh 1.2vw;
                gap: 0.6vw;
            }
            .round-badge .round-num {
                font-size: 3.8vw;
                min-width: 3.5vw;
            }
            .stats-bar {
                font-size: 1.8vw;
                gap: 1.0vw;
                padding: 0.15vh 0.8vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.6vw;
                min-width: 2.2vw;
            }
            .name-card {
                font-size: 2.6vw;
                height: 3.0vh;
                padding: 0.1vh 0.8vw;
                border-radius: 1.2vw;
                min-height: 22px;
            }
            #nameGrid {
                padding: 0.4vh 0.4vw;
                min-height: 160px;
            }
        }
    </style>
</head>

                if (!cards || cards.length === 0) return;

                const rect = container.getBoundingClientRect();
                let w = rect.width || container.clientWidth || 800;
                let h = rect.height || container.clientHeight || 500;

                w = Math.max(w - pad * 2, 180);
                h = Math.max(h - pad * 2, 180);

                // 针对短名单（≤20人），使用更大的分散系数
                const isShort = count <= 20;
                const density = Math.min(count / 80, 1);
                // 短名单时 scaleFactor 更小，让卡片更分散
                const scaleFactor = isShort ? 0.40 + density * 0.35 : 0.46 + density * 0.40;
                const areaW = w * scaleFactor;
                const areaH = h * scaleFactor;
                const offsetX = (w - areaW) / 2 + pad;
                const offsetY = (h - areaH) / 2 + pad;

                const aspect = areaW / areaH;
                let cols = Math.ceil(Math.sqrt(count * aspect));
                let rows = Math.ceil(count / cols);
                cols = Math.max(cols, 1);
                rows = Math.max(rows, 1);

                // 短名单时减少列数，让行数更多，垂直分散
                if (isShort && count <= 20) {
                    cols = Math.max(3, Math.ceil(Math.sqrt(count * aspect * 0.7)));
                    rows = Math.ceil(count / cols);
                }

                const cellW = areaW / (cols + 0.7);
                const cellH = areaH / (rows + 0.7);
                // 短名单时增加随机偏移范围，让位置更错落
                const randFactor = isShort ? 0.50 : 0.38;
                const randOffsetX = Math.min(cellW * randFactor, 55);
                const randOffsetY = Math.min(cellH * randFactor, 55);

                // 获取每个卡片的实际宽度
                const cardData = cards.map((card) => {
                    const cw = card.offsetWidth || 70;
                    const ch = card.offsetHeight || 34;
                    return { el: card, w: cw, h: ch };
                });

                const positions = [];
                // 为避免重叠，使用尝试-调整策略：如果两个卡片重叠，微调位置
                const maxAttempts = 30;
                for (let i = 0; i < cardData.length; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    let baseX = offsetX + (col + 0.5) * cellW;
                    let baseY = offsetY + (row + 0.5) * cellH;
                    let shiftX = (Math.random() - 0.5) * randOffsetX * 2;
                    let shiftY = (Math.random() - 0.5) * randOffsetY * 2;
                    const maxShiftX = Math.min(cellW * 0.35, 42);
                    const maxShiftY = Math.min(cellH * 0.35, 42);
                    shiftX = Math.max(-maxShiftX, Math.min(maxShiftX, shiftX));
                    shiftY = Math.max(-maxShiftY, Math.min(maxShiftY, shiftY));

                    let x = baseX + shiftX;
                    let y = baseY + shiftY;
                    const cw = cardData[i].w;
                    const ch = cardData[i].h;
                    x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x));
                    y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y));

                    // 检查与已有卡片的重叠，若有则微调
                    let attempt = 0;
                    let adjusted = false;
                    while (attempt < maxAttempts) {
                        let overlap = false;
                        for (let j = 0; j < positions.length; j++) {
                            const p = positions[j];
                            const gap = 6; // 最小间距（px）
                            const overlapX = (x - cw / 2 < p.x + p.w + gap) && (x + cw / 2 + gap > p.x);
                            const overlapY = (y - ch / 2 < p.y + p.h + gap) && (y + ch / 2 + gap > p.y);
                            if (overlapX && overlapY) {
                                overlap = true;
                                break;
                            }
                        }
                        if (!overlap) break;
                        // 随机微调
                        const adjustX = (Math.random() - 0.5) * Math.min(cellW * 0.3, 30);
                        const adjustY = (Math.random() - 0.5) * Math.min(cellH * 0.3, 30);
                        x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x + adjustX));
                        y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y + adjustY));
                        attempt++;
                        adjusted = true;
                    }
                    // 如果仍然重叠，强行分散（但不影响整体美观）
                    if (attempt >= maxAttempts) {
                        // 使用更极端的偏移
                        x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x + (Math.random() - 0.5) * 60));
                        y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y + (Math.random() - 0.5) * 60));
                    }

                    const rot = (Math.random() - 0.5) * 12;
                    positions.push({
                        x: x - cw / 2,
                        y: y - ch / 2,
                        rot: rot,
                        w: cw,
                        h: ch
                    });
                }

                for (let i = 0; i < cardData.length; i++) {
                    const card = cardData[i].el;
                    const pos = positions[i];
                    card.style.left = pos.x + 'px';
                    card.style.top = pos.y + 'px';
                    card.style.transform = `rotate(${pos.rot}deg)`;
                    card.style.position = 'absolute';
                    card.style.margin = '0';
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                }

                const maxBottom = positions.reduce((max, p) => Math.max(max, p.y + p.h), 0);
                const newHeight = Math.max(maxBottom + pad, 180);
                container.style.minHeight = newHeight + 'px';
                container.style.height = 'auto';
            }

            // =================================================================
            //  渲染
            // =================================================================
            function renderCards(names, options = {}) {
                const {
                    qualifySet = new Set(),
                        eliminateSet = new Set(),
                        reappearSet = new Set(),
                        extraClass = '',
                        skipLayout = false,
                } = options;

                // ---- 更新模式 ----
                if (skipLayout && grid.children.length > 0) {
                    const existing = new Map();
                    for (const child of grid.children) {
                        const name = child.dataset.name;
                        if (name) existing.set(name, child);
                    }
                    const newSet = new Set(names);

                    for (const [name, el] of existing) {
                        if (newSet.has(name)) {
                            el.className = 'name-card';
                            el.textContent = name;
                            if (qualifySet.has(name)) {
                                el.classList.add('qualify');
                                const mark = document.createElement('span');
                                mark.className = 'check-mark';
                                mark.textContent = ' ✓';
                                el.appendChild(mark);
                            }
                            if (eliminateSet.has(name)) {
                                el.classList.add('eliminate');
                            }
                            if (reappearSet.has(name)) {
                                el.classList.add('reappear');
                            }
                            if (extraClass) {
                                el.classList.add(extraClass);
                            }
                        } else {
                            el.remove();
                        }
                    }
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                // ---- 重建 ----
                grid.innerHTML = '';
                if (!names || names.length === 0) {
                    grid.innerHTML = '<div class="empty-hint">✨ 暂无名单</div>';
                    grid.style.minHeight = '180px';
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                const fragment = document.createDocumentFragment();
                const cards = [];
                names.forEach(name => {
                    const card = document.createElement('div');
                    card.className = 'name-card';
                    card.textContent = name;
                    card.dataset.name = name;
                    if (qualifySet.has(name)) {
                        card.classList.add('qualify');
                        const mark = document.createElement('span');
                        mark.className = 'check-mark';
                        mark.textContent = ' ✓';
                        card.appendChild(mark);
                    }
                    if (eliminateSet.has(name)) {
                        card.classList.add('eliminate');
                    }
                    if (reappearSet.has(name)) {
                        card.classList.add('reappear');
                    }
                    if (extraClass) {
                        card.classList.add(extraClass);
                    }
                    card.style.opacity = '0';
                    card.style.visibility = 'hidden';
                    fragment.appendChild(card);
                    cards.push(card);
                });
                grid.appendChild(fragment);
                updateStats(names, qualifySet, eliminateSet);

                if (!skipLayout) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            cards.forEach(c => {
                                c.style.visibility = 'visible';
                                c.style.opacity = '0';
                            });
                            void grid.offsetHeight;
                            applyScatterLayout(grid, cards, names.length);
                            cards.forEach((c, i) => {
                                setTimeout(() => {
                                    c.style.opacity = '1';
                                    c.style.transition = 'opacity 0.40s ease';
                                }, i * 5 + 30);
                            });
                        });
                    });
                } else {
                    cards.forEach(c => {
                        c.style.visibility = 'visible';
                        c.style.opacity = '1';
                    });
                }
            }

            function updateStats(names, qualifySet, eliminateSet) {
                const total = names ? names.length : 0;
                currentCountNum.textContent = total;
                peopleCountDisplay.textContent = `👤 ${total}`;
                const qualifyCount = qualifySet ? qualifySet.size : 0;
                const eliminateCount = eliminateSet ? eliminateSet.size : 0;
                qualifyCountNum.textContent = qualifyCount;
                eliminateCountNum.textContent = eliminateCount;
                if (qualifyCount > 0) {
                    qualifyCountNum.classList.remove('pop');
                    void qualifyCountNum.offsetWidth;
                    qualifyCountNum.classList.add('pop');
                }
                if (eliminateCount > 0) {
                    eliminateCountNum.classList.remove('pop');
                    void eliminateCountNum.offsetWidth;
                    eliminateCountNum.classList.add('pop');
                }
            }

            function updateRoundUI() {
                const idx = state.currentRound;
                const total = TOTAL_ROUNDS;
                roundDisplay.textContent = idx + 1;
                totalDisplay.textContent = total;
                roundDisplay.classList.toggle('active', true);
            }

            function renderCurrentRound() {
                const names = FIXED_ROUNDS[state.currentRound];
                renderCards(names, {
                    qualifySet: new Set(),
                    eliminateSet: new Set(),
                    reappearSet: new Set(),
                    skipLayout: false,
                });
                updateRoundUI();
            }

            // =================================================================
            //  特效
            // =================================================================
            function playQualifyEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from + 1;
                if (to >= TOTAL_ROUNDS) return;

                state.isAnimating = true;

                const prevNames = FIXED_ROUNDS[from];
                const nextNames = FIXED_ROUNDS[to];
                const nextSet = new Set(nextNames);
                const qualifySet = new Set();
                const eliminateSet = new Set();
                prevNames.forEach(name => {
                    if (nextSet.has(name)) qualifySet.add(name);
                    else eliminateSet.add(name);
                });

                renderCards(prevNames, {
                    qualifySet,
                    eliminateSet,
                    skipLayout: true,
                });

                setTimeout(() => {
                    const glowSet = new Set(nextNames);
                    renderCards(nextNames, {
                        qualifySet: glowSet,
                        extraClass: 'qualify-glow',
                        skipLayout: true,
                    });
                    state.currentRound = to;
                    updateRoundUI();

                    setTimeout(() => {
                        const normalQualify = new Set(nextNames);
                        renderCards(nextNames, {
                            qualifySet: normalQualify,
                            skipLayout: true,
                        });
                        state.isAnimating = false;

                        if (state.currentRound >= TOTAL_ROUNDS - 1) {
                            state.isFinished = true;
                            state.isAutoPlaying = false;
                            if (state.autoPlayTimer) {
                                clearTimeout(state.autoPlayTimer);
                                state.autoPlayTimer = null;
                            }
                        } else {
                            if (state.isAutoPlaying) {
                                state.autoPlayTimer = setTimeout(autoPlayStep, AUTO_PAUSE_MS);
                            }
                        }
                    }, 1400);
                }, 1100);
            }

            // =================================================================
            //  自动播放（仅由空格触发）
            // =================================================================
            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;

                // 如果已完成，重置
                if (state.isFinished) {
                    state.isFinished = false;
                    state.currentRound = 0;
                    renderCurrentRound();
                    updateRoundUI();
                    // 延迟启动
                    setTimeout(() => {
                        if (!state.isAutoPlaying && !state.isAnimating) {
                            startAutoPlayInternal();
                        }
                    }, 400);
                    return;
                }

                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    return;
                }

                startAutoPlayInternal();
            }

            function startAutoPlayInternal() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    return;
                }

                state.isAutoPlaying = true;
                state.isFinished = false;

                setTimeout(() => {
                    if (state.isAutoPlaying) {
                        autoPlayStep();
                    }
                }, 400);
            }

            function autoPlayStep() {
                if (!state.isAutoPlaying) return;
                if (state.isAnimating) {
                    state.autoPlayTimer = setTimeout(autoPlayStep, 300);
                    return;
                }
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    state.isAutoPlaying = false;
                    return;
                }
                playQualifyEffect();
            }

            // =================================================================
            //  重置
            // =================================================================
            function resetToFirst() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) {
                    state.isAutoPlaying = false;
                    if (state.autoPlayTimer) {
                        clearTimeout(state.autoPlayTimer);
                        state.autoPlayTimer = null;
                    }
                }
                state.currentRound = 0;
                state.isFinished = false;
                renderCurrentRound();
                updateRoundUI();
            }

            // =================================================================
            //  窗口大小变化
            // =================================================================
            let resizeTimer = null;

            function handleResize() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (!state.isAnimating) {
                        const names = FIXED_ROUNDS[state.currentRound];
                        const cards = grid.querySelectorAll('.name-card');
                        if (cards.length > 0 && cards.length === names.length) {
                            const cardArray = Array.from(cards);
                            const classMap = {};
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                classMap[name] = {
                                    qualify: c.classList.contains('qualify'),
                                    eliminate: c.classList.contains('eliminate'),
                                    reappear: c.classList.contains('reappear'),
                                    glow: c.classList.contains('qualify-glow'),
                                };
                            });
                            applyScatterLayout(grid, cardArray, names.length);
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                const cls = classMap[name] || {};
                                c.className = 'name-card';
                                if (cls.qualify) c.classList.add('qualify');
                                if (cls.eliminate) c.classList.add('eliminate');
                                if (cls.reappear) c.classList.add('reappear');
                                if (cls.glow) c.classList.add('qualify-glow');
                            });
                        }
                    }
                    resizeTimer = null;
                }, 350);
            }

            // =================================================================
            //  键盘 — 空格启动播放（无提示）
            // =================================================================
            function onKeyDown(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (state.isAutoPlaying) return;
                    if (state.isAnimating) return;
                    // 重置并播放
                    resetToFirst();
                    setTimeout(() => {
                        if (!state.isAutoPlaying && !state.isAnimating) {
                            startAutoPlayInternal();
                        }
                    }, 300);
                }
            }

            // =================================================================
            //  初始化（不再自动播放）
            // =================================================================
            function init() {
                renderCurrentRound();
                updateRoundUI();

                document.addEventListener('keydown', onKeyDown);
                window.addEventListener('resize', handleResize);

                console.log(`🇦🇷 FIFA 2026 武汉阿根廷球迷俱乐部观赛晋级 (录屏版)`);
                console.log('📋 各场人数:', FIXED_ROUNDS.map(r => r.length).join(' → '));
                console.log(`⏸️ 每次晋级后暂停 ${AUTO_PAUSE_SECONDS} 秒`);
                console.log('⌨️  按下空格键开始自动播放（无提示） | 刷新页面重置');
                console.log('🎯 无按钮、无自动启动，适合录屏展示');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>

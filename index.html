<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🇦🇷 阿根廷观赛 · 名单晋级</title>
    <style>
        /* ===== 全局重置 & 阿根廷蓝白主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #6CB4EE 0%, #D6EAF8 50%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* 装饰性条纹（球衣风格） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.08) 0px,
                    rgba(255, 255, 255, 0.08) 40px,
                    rgba(108, 180, 238, 0.06) 40px,
                    rgba(108, 180, 238, 0.06) 80px);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 30px 35px 35px;
            box-shadow: 0 20px 60px rgba(0, 40, 80, 0.25), 0 0 0 1px rgba(108, 180, 238, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px solid rgba(108, 180, 238, 0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1A3A5C;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 .flag {
            font-size: 32px;
        }
        .logo .sub {
            font-size: 13px;
            color: #4A7A9C;
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 500;
        }

        .round-badge {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(108, 180, 238, 0.12);
            padding: 10px 22px 10px 26px;
            border-radius: 60px;
            border: 1px solid rgba(108, 180, 238, 0.25);
        }

        .round-badge .label {
            color: #1A3A5C;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .round-badge .round-num {
            font-size: 28px;
            font-weight: 800;
            color: #1A3A5C;
            min-width: 36px;
            text-align: center;
            transition: 0.3s;
        }

        .round-badge .round-num.active {
            color: #2E86C1;
            text-shadow: 0 0 20px rgba(46, 134, 193, 0.3);
        }

        .round-badge .total {
            color: #4A7A9C;
            font-size: 16px;
            font-weight: 500;
        }

        .round-badge .people-count {
            color: #1A3A5C;
            font-size: 14px;
            background: rgba(108, 180, 238, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-left: 4px;
        }

        /* ===== 统计条 ===== */
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(108, 180, 238, 0.15);
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #1A3A5C;
            font-weight: 500;
        }

        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 18px;
            color: #1A3A5C;
            min-width: 28px;
            text-align: center;
        }

        .stats-bar .stat-item .num.qualify-num {
            color: #2E86C1;
        }
        .stats-bar .stat-item .num.eliminate-num {
            color: #E74C3C;
        }

        .stats-bar .stat-divider {
            width: 1px;
            background: rgba(108, 180, 238, 0.2);
        }

        /* ===== 名字网格 ===== */
        #nameGrid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 320px;
            padding: 18px 8px 10px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(108, 180, 238, 0.1);
            transition: all 0.4s ease;
            position: relative;
        }

        /* ===== 名字卡片 ===== */
        .name-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 18px;
            min-width: 60px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(108, 180, 238, 0.25);
            color: #1A3A5C;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: default;
            position: relative;
            user-select: none;
            box-shadow: 0 2px 8px rgba(0, 40, 80, 0.06);
        }

        .name-card:hover {
            transform: translateY(-2px) scale(1.02);
            border-color: #2E86C1;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 6px 20px rgba(46, 134, 193, 0.15);
        }

        /* ---- 晋级 ---- */
        .name-card.qualify {
            background: rgba(46, 134, 193, 0.12);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 25px rgba(46, 134, 193, 0.15), inset 0 0 20px rgba(46, 134, 193, 0.05);
            animation: qualifyPulse 1.2s ease-in-out;
        }

        @keyframes qualifyPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            30% {
                transform: scale(1.12);
                box-shadow: 0 0 50px rgba(46, 134, 193, 0.4);
                border-color: #2E86C1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 25px rgba(46, 134, 193, 0.15);
            }
        }

        .name-card.qualify .check-mark {
            display: inline-block;
            margin-left: 6px;
            font-size: 13px;
            color: #2E86C1;
        }

        /* ---- 淘汰 ---- */
        .name-card.eliminate {
            background: rgba(231, 76, 60, 0.08);
            border-color: rgba(231, 76, 60, 0.25);
            color: #C0392B;
            animation: eliminateFade 0.9s ease-in forwards;
        }

        @keyframes eliminateFade {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(231, 76, 60, 0.08);
            }
            40% {
                transform: scale(0.85);
                opacity: 0.8;
                background: rgba(231, 76, 60, 0.2);
            }
            100% {
                transform: scale(0.6) translateY(30px);
                opacity: 0;
                background: rgba(231, 76, 60, 0);
                border-color: transparent;
            }
        }

        /* ---- 回归 ---- */
        .name-card.reappear {
            animation: reappearUp 0.7s ease-out forwards;
        }

        @keyframes reappearUp {
            0% {
                transform: translateY(40px) scale(0.7);
                opacity: 0;
                background: rgba(46, 134, 193, 0.05);
            }
            60% {
                transform: translateY(-6px) scale(1.02);
                opacity: 1;
                background: rgba(46, 134, 193, 0.12);
                border-color: rgba(46, 134, 193, 0.3);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                background: rgba(255, 255, 255, 0.85);
                border-color: rgba(108, 180, 238, 0.25);
                color: #1A3A5C;
            }
        }

        /* ---- 晋级高亮（金色改为蓝色） ---- */
        .name-card.qualify-glow {
            background: rgba(46, 134, 193, 0.2);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 40px rgba(46, 134, 193, 0.25), inset 0 0 30px rgba(46, 134, 193, 0.08);
            animation: glowBlue 1.4s ease-in-out;
        }

        @keyframes glowBlue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            25% {
                transform: scale(1.15);
                box-shadow: 0 0 60px rgba(46, 134, 193, 0.5);
            }
            60% {
                transform: scale(0.95);
                box-shadow: 0 0 30px rgba(46, 134, 193, 0.2);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 40px rgba(46, 134, 193, 0.15);
            }
        }

        .empty-hint {
            color: #4A7A9C;
            font-size: 18px;
            padding: 60px 20px;
            letter-spacing: 2px;
        }

        /* ===== 底部 ===== */
        footer {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding-top: 20px;
            border-top: 2px solid rgba(108, 180, 238, 0.2);
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 10px 28px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            color: #1A3A5C;
            border: 1px solid rgba(108, 180, 238, 0.25);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .controls button:hover:not(:disabled) {
            background: #ffffff;
            border-color: #2E86C1;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 134, 193, 0.15);
        }

        .controls button:active:not(:disabled) {
            transform: scale(0.96);
        }

        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .controls button.primary {
            background: linear-gradient(135deg, #2E86C1, #1A5276);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(46, 134, 193, 0.3);
        }

        .controls button.primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #3498DB, #1A5276);
            box-shadow: 0 8px 35px rgba(46, 134, 193, 0.4);
            transform: translateY(-2px);
        }

        .controls button.primary:disabled {
            background: rgba(108, 180, 238, 0.3);
            color: rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }

        .controls button .icon {
            font-size: 18px;
            line-height: 1;
        }

        .controls button .badge {
            background: rgba(108, 180, 238, 0.15);
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #1A3A5C;
        }

        .controls button.primary .badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ===== 进度点 ===== */
        .progress-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(108, 180, 238, 0.25);
            transition: all 0.4s ease;
            border: 1px solid rgba(108, 180, 238, 0.2);
        }

        .progress-dots .dot.active {
            background: #2E86C1;
            box-shadow: 0 0 20px rgba(46, 134, 193, 0.4);
            border-color: #2E86C1;
            transform: scale(1.3);
        }

        .progress-dots .dot.done {
            background: rgba(46, 134, 193, 0.3);
            border-color: rgba(46, 134, 193, 0.2);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            #app {
                padding: 18px 16px 22px;
                border-radius: 28px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .round-badge {
                padding: 8px 14px 8px 18px;
                gap: 10px;
            }
            .round-badge .round-num {
                font-size: 22px;
                min-width: 28px;
            }
            .round-badge .people-count {
                font-size: 12px;
                padding: 2px 10px;
            }
            .stats-bar {
                gap: 14px;
                margin-bottom: 14px;
                padding: 8px 14px;
            }
            .stats-bar .stat-item {
                font-size: 12px;
            }
            .stats-bar .stat-item .num {
                font-size: 15px;
                min-width: 20px;
            }
            #nameGrid {
                gap: 7px;
                padding: 12px 4px 6px;
                min-height: 200px;
            }
            .name-card {
                padding: 5px 12px;
                min-width: 44px;
                height: 36px;
                font-size: 13px;
                border-radius: 8px;
            }
            .controls button {
                padding: 8px 18px;
                font-size: 13px;
            }
            .controls button .badge {
                display: none;
            }
            .progress-dots .dot {
                width: 8px;
                height: 8px;
            }
            footer {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .controls {
                justify-content: center;
            }
            .progress-dots {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .name-card {
                padding: 4px 10px;
                min-width: 36px;
                height: 30px;
                font-size: 11px;
                border-radius: 6px;
            }
            #nameGrid {
                gap: 5px;
                padding: 8px 2px 4px;
            }
            .controls button {
                padding: 6px 14px;
                font-size: 12px;
            }
            .round-badge .label {
                font-size: 11px;
            }
            .round-badge .round-num {
                font-size: 18px;
                min-width: 22px;
            }
        }

        /* ===== 工具类 ===== */
        .stat-item .num.pop {
            animation: popNum 0.5s ease;
        }

        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
                color: #2E86C1;
            }
            100% {
                transform: scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(108, 180, 238, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2E86C1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1A5276;
        }
    </style>
</head>

                [
                    "A", "烟枪", "沐沐小无邪", "28号zz", "🇦🇷kun", "胡嵩",
                    "🐑雨点", "流浪猫", "史涛维", "锡锅", "Arhbo", "🙊陈聘聘",
                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第七场（16人，比第六场少“史涛维”）
                [
                    "A", "烟枪", "沐沐小无邪", "28号zz", "🇦🇷kun", "胡嵩",
                    "🐑雨点", "流浪猫", "锡锅", "Arhbo", "🙊陈聘聘",
                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第八场（16人，与第七场相同）
                [
                    "A", "烟枪", "沐沐小无邪", "28号zz", "🇦🇷kun", "胡嵩",
                    "🐑雨点", "流浪猫", "锡锅", "Arhbo", "🙊陈聘聘",
                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ]
            ];

            // =================================================================
            //  状态管理
            // =================================================================

            const TOTAL_ROUNDS = FIXED_ROUNDS.length;
            const AUTO_PAUSE_MS = AUTO_PAUSE_SECONDS * 1000;

            const state = {
                currentRound: 0,
                isAnimating: false,
                autoPlayTimer: null,
                isAutoPlaying: false,
            };

            // =================================================================
            //  DOM 引用
            // =================================================================

            const grid = document.getElementById('nameGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const totalDisplay = document.getElementById('totalDisplay');
            const peopleCountDisplay = document.getElementById('peopleCountDisplay');
            const currentCountNum = document.getElementById('currentCountNum');
            const qualifyCountNum = document.getElementById('qualifyCountNum');
            const eliminateCountNum = document.getElementById('eliminateCountNum');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const autoBtn = document.getElementById('autoBtn');
            const resetBtn = document.getElementById('resetBtn');
            const prevBadge = document.getElementById('prevBadge');
            const nextBadge = document.getElementById('nextBadge');
            const progressDots = document.getElementById('progressDots');

            // =================================================================
            //  渲染函数
            // =================================================================

            function renderCards(names, options = {}) {
                const {
                    qualifySet = new Set(),
                        eliminateSet = new Set(),
                        reappearSet = new Set(),
                        extraClass = '',
                } = options;

                grid.innerHTML = '';

                if (!names || names.length === 0) {
                    grid.innerHTML = '<div class="empty-hint">✨ 暂无名单</div>';
                    return;
                }

                const sorted = [...names];
                const fragment = document.createDocumentFragment();

                sorted.forEach(name => {
                    const card = document.createElement('div');
                    card.className = 'name-card';
                    card.textContent = name;
                    card.dataset.name = name;

                    if (qualifySet.has(name)) {
                        card.classList.add('qualify');
                        const mark = document.createElement('span');
                        mark.className = 'check-mark';
                        mark.textContent = ' ✓';
                        card.appendChild(mark);
                    }

                    if (eliminateSet.has(name)) {
                        card.classList.add('eliminate');
                    }

                    if (reappearSet.has(name)) {
                        card.classList.add('reappear');
                    }

                    if (extraClass) {
                        card.classList.add(extraClass);
                    }

                    fragment.appendChild(card);
                });

                grid.appendChild(fragment);

                const total = names.length;
                currentCountNum.textContent = total;
                peopleCountDisplay.textContent = `👤 ${total}`;

                const qualifyCount = qualifySet.size;
                const eliminateCount = eliminateSet.size;
                qualifyCountNum.textContent = qualifyCount;
                eliminateCountNum.textContent = eliminateCount;

                if (qualifyCount > 0) {
                    qualifyCountNum.classList.remove('pop');
                    void qualifyCountNum.offsetWidth;
                    qualifyCountNum.classList.add('pop');
                }
                if (eliminateCount > 0) {
                    eliminateCountNum.classList.remove('pop');
                    void eliminateCountNum.offsetWidth;
                    eliminateCountNum.classList.add('pop');
                }
            }

            function updateRoundUI() {
                const idx = state.currentRound;
                const total = TOTAL_ROUNDS;
                roundDisplay.textContent = idx + 1;
                totalDisplay.textContent = total;
                roundDisplay.classList.toggle('active', true);

                const dots = progressDots.querySelectorAll('.dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === idx);
                    dot.classList.toggle('done', i < idx);
                });

                prevBtn.disabled = idx === 0 || state.isAnimating;
                nextBtn.disabled = idx === total - 1 || state.isAnimating;

                if (idx > 0) {
                    prevBadge.textContent = FIXED_ROUNDS[idx - 1].length;
                } else {
                    prevBadge.textContent = '-';
                }
                if (idx < total - 1) {
                    nextBadge.textContent = FIXED_ROUNDS[idx + 1].length;
                } else {
                    nextBadge.textContent = '-';
                }

                if (state.isAutoPlaying) {
                    autoBtn.innerHTML = '<span class="icon">⏸</span> 暂停';
                } else {
                    autoBtn.innerHTML = '<span class="icon">▶</span> 自动播放';
                }
            }

            function initDots() {
                progressDots.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'dot';
                    if (i === 0) dot.classList.add('active');
                    progressDots.appendChild(dot);
                }
            }

            function renderCurrentRound() {
                const names = FIXED_ROUNDS[state.currentRound];
                renderCards(names, {
                    qualifySet: new Set(),
                    eliminateSet: new Set(),
                    reappearSet: new Set(),
                });
                updateRoundUI();
            }

            // =================================================================
            //  晋级 / 回退特效
            // =================================================================

            function playQualifyEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from + 1;
                if (to >= TOTAL_ROUNDS) return;

                state.isAnimating = true;
                nextBtn.disabled = true;
                prevBtn.disabled = true;

                const prevNames = FIXED_ROUNDS[from];
                const nextNames = FIXED_ROUNDS[to];
                const nextSet = new Set(nextNames);

                const qualifySet = new Set();
                const eliminateSet = new Set();

                prevNames.forEach(name => {
                    if (nextSet.has(name)) {
                        qualifySet.add(name);
                    } else {
                        eliminateSet.add(name);
                    }
                });

                renderCards(prevNames, {
                    qualifySet,
                    eliminateSet,
                    extraClass: '',
                });

                qualifyCountNum.textContent = qualifySet.size;
                eliminateCountNum.textContent = eliminateSet.size;

                setTimeout(() => {
                    const glowSet = new Set(nextNames);
                    renderCards(nextNames, {
                        qualifySet: glowSet,
                        eliminateSet: new Set(),
                        extraClass: 'qualify-glow',
                    });

                    state.currentRound = to;
                    updateRoundUI();

                    qualifyCountNum.textContent = 0;
                    eliminateCountNum.textContent = 0;

                    setTimeout(() => {
                        const normalQualify = new Set(nextNames);
                        renderCards(nextNames, {
                            qualifySet: normalQualify,
                            eliminateSet: new Set(),
                            extraClass: '',
                        });
                        qualifyCountNum.textContent = 0;
                        eliminateCountNum.textContent = 0;
                        currentCountNum.textContent = nextNames.length;
                        peopleCountDisplay.textContent = `👤 ${nextNames.length}`;

                        state.isAnimating = false;
                        updateRoundUI();
                    }, 1400);

                }, 1100);
            }

            function playReappearEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from - 1;
                if (to < 0) return;

                state.isAnimating = true;
                nextBtn.disabled = true;
                prevBtn.disabled = true;

                const currentNames = FIXED_ROUNDS[from];
                const prevNames = FIXED_ROUNDS[to];
                const prevSet = new Set(prevNames);

                const keepSet = new Set();
                const reappearSet = new Set();

                prevNames.forEach(name => {
                    if (currentNames.includes(name)) {
                        keepSet.add(name);
                    } else {
                        reappearSet.add(name);
                    }
                });

                renderCards(prevNames, {
                    qualifySet: keepSet,
                    eliminateSet: new Set(),
                    reappearSet: reappearSet,
                });

                qualifyCountNum.textContent = keepSet.size;
                eliminateCountNum.textContent = reappearSet.size;
                currentCountNum.textContent = prevNames.length;
                peopleCountDisplay.textContent = `👤 ${prevNames.length}`;

                setTimeout(() => {
                    state.currentRound = to;
                    updateRoundUI();

                    const normalQualify = new Set(prevNames);
                    renderCards(prevNames, {
                        qualifySet: normalQualify,
                        eliminateSet: new Set(),
                        reappearSet: new Set(),
                        extraClass: '',
                    });

                    qualifyCountNum.textContent = 0;
                    eliminateCountNum.textContent = 0;

                    state.isAnimating = false;
                    updateRoundUI();
                }, 900);
            }

            // =================================================================
            //  交互控制
            // =================================================================

            function goToNext() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                if (state.currentRound >= TOTAL_ROUNDS - 1) return;
                playQualifyEffect();
            }

            function goToPrev() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                if (state.currentRound <= 0) return;
                playReappearEffect();
            }

            function resetToFirst() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                state.currentRound = 0;
                renderCurrentRound();
                updateRoundUI();
            }

            // ---- 自动播放 ----
            function toggleAutoPlay() {
                if (state.isAutoPlaying) {
                    stopAutoPlay();
                } else {
                    startAutoPlay();
                }
            }

            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                state.isAutoPlaying = true;
                autoBtn.innerHTML = '<span class="icon">⏸</span> 暂停';
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.currentRound = 0;
                    renderCurrentRound();
                    updateRoundUI();
                }
                setTimeout(() => {
                    if (state.isAutoPlaying) {
                        autoPlayStep();
                    }
                }, 400);
            }

            function stopAutoPlay() {
                state.isAutoPlaying = false;
                if (state.autoPlayTimer) {
                    clearTimeout(state.autoPlayTimer);
                    state.autoPlayTimer = null;
                }
                autoBtn.innerHTML = '<span class="icon">▶</span> 自动播放';
            }

            function autoPlayStep() {
                if (!state.isAutoPlaying) return;
                if (state.isAnimating) {
                    state.autoPlayTimer = setTimeout(autoPlayStep, 300);
                    return;
                }

                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    stopAutoPlay();
                    return;
                }

                playQualifyEffect();

                const checkDone = () => {
                    if (!state.isAnimating) {
                        if (state.isAutoPlaying && state.currentRound < TOTAL_ROUNDS - 1) {
                            state.autoPlayTimer = setTimeout(autoPlayStep, AUTO_PAUSE_MS);
                        } else if (state.isAutoPlaying && state.currentRound >= TOTAL_ROUNDS - 1) {
                            stopAutoPlay();
                        }
                    } else {
                        state.autoPlayTimer = setTimeout(checkDone, 300);
                    }
                };

                state.autoPlayTimer = setTimeout(checkDone, 1200);
            }

            // =================================================================
            //  初始化
            // =================================================================

            function init() {
                initDots();
                renderCurrentRound();
                updateRoundUI();

                nextBtn.addEventListener('click', goToNext);
                prevBtn.addEventListener('click', goToPrev);
                resetBtn.addEventListener('click', resetToFirst);
                autoBtn.addEventListener('click', toggleAutoPlay);

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') {
                        e.preventDefault();
                        goToNext();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        goToPrev();
                    } else if (e.key === 'r') {
                        resetToFirst();
                    }
                });

                console.log(`🇦🇷 阿根廷观赛晋级已启动（共 ${TOTAL_ROUNDS} 场）`);
                console.log('📋 各场人数:', FIXED_ROUNDS.map(r => r.length).join(' → '));
                console.log(`⏸️ 自动播放每次晋级后暂停 ${AUTO_PAUSE_SECONDS} 秒`);
                console.log('⌨️  快捷键: ← 上一场 | → / Space 下一场 | r 重置');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>

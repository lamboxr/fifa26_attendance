<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>🇦🇷 阿根廷 · 观赛晋级 (大屏版)</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #6CB4EE 0%, #D6EAF8 50%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.2vh 1.2vw;
            position: relative;
        }

        /* 球衣条纹装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.07) 0px,
                    rgba(255, 255, 255, 0.07) 5vw,
                    rgba(108, 180, 238, 0.04) 5vw,
                    rgba(108, 180, 238, 0.04) 10vw);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            width: 98vw;
            max-width: 98vw;
            height: 96vh;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2.5vw;
            padding: 2vh 2.5vw 1.8vh;
            box-shadow: 0 2vh 6vh rgba(0, 40, 80, 0.20), 0 0 0 0.2vw rgba(108, 180, 238, 0.15);
            border: 0.15vw solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            transition: all 0.2s ease;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.2vh;
            padding-bottom: 0.8vh;
            border-bottom: 0.2vw solid rgba(108, 180, 238, 0.25);
            flex-shrink: 0;
        }

        .logo h1 {
            font-size: 2.8vw;
            font-weight: 800;
            color: #1A3A5C;
            display: flex;
            align-items: center;
            gap: 0.6vw;
        }
        .logo h1 .flag {
            font-size: 3.2vw;
        }
        .logo .sub {
            font-size: 1.0vw;
            color: #4A7A9C;
            letter-spacing: 0.2vw;
            margin-top: 0.1vh;
            font-weight: 500;
        }

        .round-badge {
            display: flex;
            align-items: center;
            gap: 1.4vw;
            background: rgba(108, 180, 238, 0.10);
            padding: 0.5vh 2vw 0.5vh 2.2vw;
            border-radius: 4vw;
            border: 0.12vw solid rgba(108, 180, 238, 0.20);
            font-size: 1.0vw;
        }
        .round-badge .label {
            color: #1A3A5C;
            font-weight: 600;
            letter-spacing: 0.1vw;
        }
        .round-badge .round-num {
            font-size: 2.4vw;
            font-weight: 800;
            color: #1A3A5C;
            min-width: 2.4vw;
            text-align: center;
            transition: 0.3s;
        }
        .round-badge .round-num.active {
            color: #2E86C1;
            text-shadow: 0 0 2vw rgba(46, 134, 193, 0.25);
        }
        .round-badge .total {
            color: #4A7A9C;
            font-size: 1.4vw;
            font-weight: 500;
        }
        .round-badge .people-count {
            color: #1A3A5C;
            font-size: 1.2vw;
            background: rgba(108, 180, 238, 0.12);
            padding: 0.2vh 1.2vw;
            border-radius: 2.5vw;
            font-weight: 600;
            margin-left: 0.2vw;
        }

        /* ===== 统计条 ===== */
        .stats-bar {
            display: flex;
            gap: 2vw;
            margin-bottom: 1.2vh;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.40);
            padding: 0.4vh 1.4vw;
            border-radius: 1.6vw;
            backdrop-filter: blur(4px);
            border: 0.1vw solid rgba(108, 180, 238, 0.10);
            flex-shrink: 0;
            font-size: 1.0vw;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            color: #1A3A5C;
            font-weight: 500;
        }
        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 1.6vw;
            color: #1A3A5C;
            min-width: 1.8vw;
            text-align: center;
        }
        .stats-bar .stat-item .num.qualify-num {
            color: #2E86C1;
        }
        .stats-bar .stat-item .num.eliminate-num {
            color: #E74C3C;
        }
        .stats-bar .stat-divider {
            width: 0.1vw;
            background: rgba(108, 180, 238, 0.15);
        }

        /* ===== 名字网格 — 核心区域，占据绝大部分空间 ===== */
        #nameGrid {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            padding: 1.2vh 1.2vw;
            border-radius: 1.8vw;
            background: rgba(255, 255, 255, 0.15);
            border: 0.1vw solid rgba(108, 180, 238, 0.06);
            overflow: visible;
        }

        /* ===== 名字卡片 — 大尺寸，清晰醒目 ===== */
        .name-card {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.6vh 1.8vw;
            min-width: 4.5vw;
            height: 4.8vh;
            border-radius: 1.2vw;
            background: rgba(255, 255, 255, 0.88);
            border: 0.15vw solid rgba(108, 180, 238, 0.30);
            color: #1A3A5C;
            font-size: 1.8vw;
            font-weight: 500;
            transition: left 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.4s ease,
                background 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease,
                opacity 0.5s ease;
            cursor: default;
            user-select: none;
            box-shadow: 0 0.2vw 1vw rgba(0, 40, 80, 0.06);
            white-space: nowrap;
            z-index: 1;
            will-change: left, top, transform;
            letter-spacing: 0.04vw;
        }
        .name-card:hover {
            transform: scale(1.10) rotate(0deg) !important;
            border-color: #2E86C1;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 0.8vw 3vw rgba(46, 134, 193, 0.18);
            z-index: 100;
        }

        .name-card.qualify {
            background: rgba(46, 134, 193, 0.12);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 2.5vw rgba(46, 134, 193, 0.10), inset 0 0 2vw rgba(46, 134, 193, 0.04);
            animation: qualifyPulse 1.2s ease-in-out;
            z-index: 10;
        }
        @keyframes qualifyPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            30% {
                transform: scale(1.12);
                box-shadow: 0 0 5vw rgba(46, 134, 193, 0.30);
                border-color: #2E86C1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 2.5vw rgba(46, 134, 193, 0.10);
            }
        }
        .name-card.qualify .check-mark {
            display: inline-block;
            margin-left: 0.4vw;
            font-size: 1.2vw;
            color: #2E86C1;
        }

        .name-card.eliminate {
            background: rgba(231, 76, 60, 0.08);
            border-color: rgba(231, 76, 60, 0.22);
            color: #C0392B;
            animation: eliminateFade 0.9s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes eliminateFade {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(231, 76, 60, 0.08);
            }
            40% {
                transform: scale(0.78);
                opacity: 0.8;
                background: rgba(231, 76, 60, 0.18);
            }
            100% {
                transform: scale(0.35) translateY(5vh);
                opacity: 0;
                background: rgba(231, 76, 60, 0);
                border-color: transparent;
            }
        }

        .name-card.reappear {
            animation: reappearUp 0.8s ease-out forwards;
            z-index: 8;
        }
        @keyframes reappearUp {
            0% {
                transform: translateY(6vh) scale(0.5);
                opacity: 0;
                background: rgba(46, 134, 193, 0.05);
            }
            60% {
                transform: translateY(-0.6vh) scale(1.04);
                opacity: 1;
                background: rgba(46, 134, 193, 0.10);
                border-color: rgba(46, 134, 193, 0.30);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                background: rgba(255, 255, 255, 0.88);
                border-color: rgba(108, 180, 238, 0.30);
                color: #1A3A5C;
            }
        }

        .name-card.qualify-glow {
            background: rgba(46, 134, 193, 0.18);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 5vw rgba(46, 134, 193, 0.22), inset 0 0 3vw rgba(46, 134, 193, 0.06);
            animation: glowBlue 1.5s ease-in-out;
            z-index: 20;
        }
        @keyframes glowBlue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            25% {
                transform: scale(1.16);
                box-shadow: 0 0 8vw rgba(46, 134, 193, 0.40);
            }
            60% {
                transform: scale(0.94);
                box-shadow: 0 0 3.5vw rgba(46, 134, 193, 0.15);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 5vw rgba(46, 134, 193, 0.12);
            }
        }

        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4A7A9C;
            font-size: 2.2vw;
            letter-spacing: 0.2vw;
        }

        /* ===== 底部 — 仅保留一个自动播放按钮 ===== */
        footer {
            margin-top: 1.2vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 0.8vh;
            border-top: 0.15vw solid rgba(108, 180, 238, 0.15);
            flex-shrink: 0;
            gap: 2vw;
        }

        .controls {
            display: flex;
            gap: 1.2vw;
            align-items: center;
        }

        .controls button {
            padding: 0.7vh 2.8vw;
            border: none;
            border-radius: 5vw;
            font-size: 1.6vw;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.6vw;
            background: linear-gradient(135deg, #2E86C1, #1A5276);
            color: #fff;
            border: 0.12vw solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            box-shadow: 0 0.4vw 2vw rgba(46, 134, 193, 0.30);
            letter-spacing: 0.1vw;
        }
        .controls button:hover:not(:disabled) {
            background: linear-gradient(135deg, #3498DB, #1A5276);
            box-shadow: 0 0.8vw 3.5vw rgba(46, 134, 193, 0.45);
            transform: translateY(-0.2vw) scale(1.02);
        }
        .controls button:active:not(:disabled) {
            transform: scale(0.96);
        }
        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 0.2vw 1vw rgba(46, 134, 193, 0.15);
        }
        .controls button .icon {
            font-size: 1.8vw;
            line-height: 1;
        }

        /* 快捷键提示 — 小字显示 */
        .shortcut-hint {
            color: rgba(26, 58, 92, 0.35);
            font-size: 0.9vw;
            font-weight: 400;
            letter-spacing: 0.05vw;
            user-select: none;
        }

        /* ===== 进度点（保留，作为视觉辅助） ===== */
        .progress-dots {
            display: flex;
            gap: 0.6vw;
            align-items: center;
        }
        .progress-dots .dot {
            width: 0.9vw;
            height: 0.9vw;
            border-radius: 50%;
            background: rgba(108, 180, 238, 0.20);
            transition: all 0.4s ease;
            border: 0.08vw solid rgba(108, 180, 238, 0.15);
        }
        .progress-dots .dot.active {
            background: #2E86C1;
            box-shadow: 0 0 1.5vw rgba(46, 134, 193, 0.35);
            border-color: #2E86C1;
            transform: scale(1.3);
        }
        .progress-dots .dot.done {
            background: rgba(46, 134, 193, 0.25);
            border-color: rgba(46, 134, 193, 0.15);
        }

        /* ===== 工具类 ===== */
        .stat-item .num.pop {
            animation: popNum 0.5s ease;
        }
        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
                color: #2E86C1;
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== 响应式（小屏保底） ===== */
        @media (max-width: 1200px) {
            #app {
                width: 100%;
                max-width: 100%;
                height: 94vh;
                padding: 1.5vh 2vw;
            }
            .logo h1 {
                font-size: 3.2vw;
            }
            .name-card {
                font-size: 2vw;
                height: 4.2vh;
                padding: 0.4vh 1.4vw;
                border-radius: 1.2vw;
                min-width: 5vw;
            }
            .controls button {
                font-size: 1.8vw;
                padding: 0.6vh 2.4vw;
            }
        }

        @media (max-width: 768px) {
            #app {
                height: auto;
                min-height: 90vh;
                padding: 1.2vh 1.5vw;
                border-radius: 4vw;
            }
            .logo h1 {
                font-size: 4vw;
            }
            .logo .sub {
                font-size: 1.6vw;
            }
            .round-badge {
                font-size: 1.6vw;
                padding: 0.3vh 2vw;
                gap: 1vw;
            }
            .round-badge .round-num {
                font-size: 3.2vw;
                min-width: 3vw;
            }
            .stats-bar {
                font-size: 1.6vw;
                gap: 1.5vw;
                padding: 0.3vh 1.2vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.2vw;
            }
            .name-card {
                font-size: 2.4vw;
                height: 3.8vh;
                padding: 0.2vh 1vw;
                border-radius: 1.2vw;
                min-width: 5.5vw;
            }
            .controls button {
                font-size: 2.2vw;
                padding: 0.4vh 3vw;
            }
            .shortcut-hint {
                font-size: 1.4vw;
            }
            .progress-dots .dot {
                width: 1.4vw;
                height: 1.4vw;
            }
        }

        @media (max-width: 480px) {
            #app {
                padding: 0.8vh 1vw;
                border-radius: 3vw;
            }
            .logo h1 {
                font-size: 5vw;
            }
            .logo .sub {
                font-size: 2vw;
            }
            .round-badge {
                font-size: 2.2vw;
                padding: 0.2vh 1.5vw;
                gap: 0.8vw;
            }
            .round-badge .round-num {
                font-size: 4vw;
                min-width: 4vw;
            }
            .stats-bar {
                font-size: 2vw;
                gap: 1.2vw;
                padding: 0.2vh 1vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.8vw;
            }
            .name-card {
                font-size: 2.8vw;
                height: 3.2vh;
                padding: 0.1vh 0.8vw;
                border-radius: 1.5vw;
                min-width: 6vw;
            }
            .controls button {
                font-size: 2.8vw;
                padding: 0.3vh 3.5vw;
            }
            .shortcut-hint {
                font-size: 1.8vw;
            }
            .progress-dots .dot {
                width: 1.8vw;
                height: 1.8vw;
            }
        }
    </style>
</head>

                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ]
            ];

            // =================================================================
            //  状态管理
            // =================================================================
            const TOTAL_ROUNDS = FIXED_ROUNDS.length;
            const AUTO_PAUSE_MS = AUTO_PAUSE_SECONDS * 1000;

            const state = {
                currentRound: 0,
                isAnimating: false,
                autoPlayTimer: null,
                isAutoPlaying: false,
                isFinished: false, // 是否播放完成（停在第八场）
            };

            // =================================================================
            //  DOM 引用
            // =================================================================
            const grid = document.getElementById('nameGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const totalDisplay = document.getElementById('totalDisplay');
            const peopleCountDisplay = document.getElementById('peopleCountDisplay');
            const currentCountNum = document.getElementById('currentCountNum');
            const qualifyCountNum = document.getElementById('qualifyCountNum');
            const eliminateCountNum = document.getElementById('eliminateCountNum');
            const autoBtn = document.getElementById('autoBtn');
            const progressDots = document.getElementById('progressDots');

            // =================================================================
            //  布局算法（散落聚集）
            // =================================================================
            function applyScatterLayout(container, cards, count) {
                if (!cards || cards.length === 0) return;

                const rect = container.getBoundingClientRect();
                let w = rect.width || container.clientWidth || 800;
                let h = rect.height || container.clientHeight || 500;

                const pad = Math.min(w * 0.018, 35);
                w = Math.max(w - pad * 2, 200);
                h = Math.max(h - pad * 2, 200);

                const density = Math.min(count / 80, 1);
                const scaleFactor = 0.48 + density * 0.38;
                const areaW = w * scaleFactor;
                const areaH = h * scaleFactor;
                const offsetX = (w - areaW) / 2 + pad;
                const offsetY = (h - areaH) / 2 + pad;

                const aspect = areaW / areaH;
                let cols = Math.ceil(Math.sqrt(count * aspect));
                let rows = Math.ceil(count / cols);
                cols = Math.max(cols, 1);
                rows = Math.max(rows, 1);

                const cellW = areaW / (cols + 0.6);
                const cellH = areaH / (rows + 0.6);
                const randOffsetX = Math.min(cellW * 0.38, 45);
                const randOffsetY = Math.min(cellH * 0.38, 45);

                const cardData = cards.map((card) => {
                    const cw = card.offsetWidth || 80;
                    const ch = card.offsetHeight || 40;
                    return { el: card, w: cw, h: ch };
                });

                const positions = [];
                for (let i = 0; i < cardData.length; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    let baseX = offsetX + (col + 0.5) * cellW;
                    let baseY = offsetY + (row + 0.5) * cellH;
                    let shiftX = (Math.random() - 0.5) * randOffsetX * 2;
                    let shiftY = (Math.random() - 0.5) * randOffsetY * 2;
                    const maxShiftX = Math.min(cellW * 0.32, 35);
                    const maxShiftY = Math.min(cellH * 0.32, 35);
                    shiftX = Math.max(-maxShiftX, Math.min(maxShiftX, shiftX));
                    shiftY = Math.max(-maxShiftY, Math.min(maxShiftY, shiftY));

                    let x = baseX + shiftX;
                    let y = baseY + shiftY;
                    const cw = cardData[i].w;
                    const ch = cardData[i].h;
                    x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x));
                    y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y));
                    const rot = (Math.random() - 0.5) * 12;
                    positions.push({
                        x: x - cw / 2,
                        y: y - ch / 2,
                        rot: rot,
                        w: cw,
                        h: ch
                    });
                }

                for (let i = 0; i < cardData.length; i++) {
                    const card = cardData[i].el;
                    const pos = positions[i];
                    card.style.left = pos.x + 'px';
                    card.style.top = pos.y + 'px';
                    card.style.transform = `rotate(${pos.rot}deg)`;
                    card.style.position = 'absolute';
                    card.style.margin = '0';
                    card.style.width = 'auto';
                    card.style.maxWidth = '180px';
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                }

                const maxBottom = positions.reduce((max, p) => Math.max(max, p.y + p.h), 0);
                const newHeight = Math.max(maxBottom + pad, 200);
                container.style.minHeight = newHeight + 'px';
                container.style.height = 'auto';
            }

            // =================================================================
            //  渲染核心
            // =================================================================
            function renderCards(names, options = {}) {
                const {
                    qualifySet = new Set(),
                        eliminateSet = new Set(),
                        reappearSet = new Set(),
                        extraClass = '',
                        skipLayout = false,
                } = options;

                // ---- 更新模式 ----
                if (skipLayout && grid.children.length > 0) {
                    const existing = new Map();
                    for (const child of grid.children) {
                        const name = child.dataset.name;
                        if (name) existing.set(name, child);
                    }
                    const newSet = new Set(names);

                    for (const [name, el] of existing) {
                        if (newSet.has(name)) {
                            el.className = 'name-card';
                            el.textContent = name;
                            if (qualifySet.has(name)) {
                                el.classList.add('qualify');
                                const mark = document.createElement('span');
                                mark.className = 'check-mark';
                                mark.textContent = ' ✓';
                                el.appendChild(mark);
                            }
                            if (eliminateSet.has(name)) {
                                el.classList.add('eliminate');
                            }
                            if (reappearSet.has(name)) {
                                el.classList.add('reappear');
                            }
                            if (extraClass) {
                                el.classList.add(extraClass);
                            }
                        } else {
                            el.remove();
                        }
                    }
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                // ---- 重建模式 ----
                grid.innerHTML = '';
                if (!names || names.length === 0) {
                    grid.innerHTML = '<div class="empty-hint">✨ 暂无名单</div>';
                    grid.style.minHeight = '200px';
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                const fragment = document.createDocumentFragment();
                const cards = [];
                names.forEach(name => {
                    const card = document.createElement('div');
                    card.className = 'name-card';
                    card.textContent = name;
                    card.dataset.name = name;
                    if (qualifySet.has(name)) {
                        card.classList.add('qualify');
                        const mark = document.createElement('span');
                        mark.className = 'check-mark';
                        mark.textContent = ' ✓';
                        card.appendChild(mark);
                    }
                    if (eliminateSet.has(name)) {
                        card.classList.add('eliminate');
                    }
                    if (reappearSet.has(name)) {
                        card.classList.add('reappear');
                    }
                    if (extraClass) {
                        card.classList.add(extraClass);
                    }
                    card.style.opacity = '0';
                    card.style.visibility = 'hidden';
                    fragment.appendChild(card);
                    cards.push(card);
                });
                grid.appendChild(fragment);
                updateStats(names, qualifySet, eliminateSet);

                if (!skipLayout) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            cards.forEach(c => {
                                c.style.visibility = 'visible';
                                c.style.opacity = '0';
                            });
                            void grid.offsetHeight;
                            applyScatterLayout(grid, cards, names.length);
                            cards.forEach((c, i) => {
                                setTimeout(() => {
                                    c.style.opacity = '1';
                                    c.style.transition = 'opacity 0.35s ease';
                                }, i * 5 + 20);
                            });
                        });
                    });
                } else {
                    cards.forEach(c => {
                        c.style.visibility = 'visible';
                        c.style.opacity = '1';
                    });
                }
            }

            function updateStats(names, qualifySet, eliminateSet) {
                const total = names ? names.length : 0;
                currentCountNum.textContent = total;
                peopleCountDisplay.textContent = `👤 ${total}`;
                const qualifyCount = qualifySet ? qualifySet.size : 0;
                const eliminateCount = eliminateSet ? eliminateSet.size : 0;
                qualifyCountNum.textContent = qualifyCount;
                eliminateCountNum.textContent = eliminateCount;
                if (qualifyCount > 0) {
                    qualifyCountNum.classList.remove('pop');
                    void qualifyCountNum.offsetWidth;
                    qualifyCountNum.classList.add('pop');
                }
                if (eliminateCount > 0) {
                    eliminateCountNum.classList.remove('pop');
                    void eliminateCountNum.offsetWidth;
                    eliminateCountNum.classList.add('pop');
                }
            }

            // =================================================================
            //  UI 更新
            // =================================================================
            function updateRoundUI() {
                const idx = state.currentRound;
                const total = TOTAL_ROUNDS;
                roundDisplay.textContent = idx + 1;
                totalDisplay.textContent = total;
                roundDisplay.classList.toggle('active', true);

                const dots = progressDots.querySelectorAll('.dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === idx);
                    dot.classList.toggle('done', i < idx);
                });

                // 更新按钮状态
                if (state.isAutoPlaying) {
                    autoBtn.innerHTML = '<span class="icon">⏳</span> 播放中...';
                    autoBtn.disabled = true;
                } else if (state.isFinished) {
                    autoBtn.innerHTML = '<span class="icon">▶</span> 重新播放';
                    autoBtn.disabled = false;
                } else {
                    autoBtn.innerHTML = '<span class="icon">▶</span> 自动播放';
                    autoBtn.disabled = false;
                }
            }

            function initDots() {
                progressDots.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'dot';
                    if (i === 0) dot.classList.add('active');
                    progressDots.appendChild(dot);
                }
            }

            function renderCurrentRound() {
                const names = FIXED_ROUNDS[state.currentRound];
                renderCards(names, {
                    qualifySet: new Set(),
                    eliminateSet: new Set(),
                    reappearSet: new Set(),
                    skipLayout: false,
                });
                updateRoundUI();
            }

            // =================================================================
            //  特效函数
            // =================================================================
            function playQualifyEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from + 1;
                if (to >= TOTAL_ROUNDS) return;

                state.isAnimating = true;
                autoBtn.disabled = true;

                const prevNames = FIXED_ROUNDS[from];
                const nextNames = FIXED_ROUNDS[to];
                const nextSet = new Set(nextNames);
                const qualifySet = new Set();
                const eliminateSet = new Set();
                prevNames.forEach(name => {
                    if (nextSet.has(name)) qualifySet.add(name);
                    else eliminateSet.add(name);
                });

                renderCards(prevNames, {
                    qualifySet,
                    eliminateSet,
                    skipLayout: true,
                });

                setTimeout(() => {
                    const glowSet = new Set(nextNames);
                    renderCards(nextNames, {
                        qualifySet: glowSet,
                        extraClass: 'qualify-glow',
                        skipLayout: true,
                    });
                    state.currentRound = to;
                    updateRoundUI();

                    setTimeout(() => {
                        const normalQualify = new Set(nextNames);
                        renderCards(nextNames, {
                            qualifySet: normalQualify,
                            skipLayout: true,
                        });
                        state.isAnimating = false;

                        // 检查是否播放完成
                        if (state.currentRound >= TOTAL_ROUNDS - 1) {
                            state.isFinished = true;
                            state.isAutoPlaying = false;
                            if (state.autoPlayTimer) {
                                clearTimeout(state.autoPlayTimer);
                                state.autoPlayTimer = null;
                            }
                            updateRoundUI();
                        } else {
                            updateRoundUI();
                        }
                    }, 1400);
                }, 1100);
            }

            function playReappearEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from - 1;
                if (to < 0) return;

                state.isAnimating = true;
                autoBtn.disabled = true;

                const prevNames = FIXED_ROUNDS[to];
                const currentNames = FIXED_ROUNDS[from];
                const keepSet = new Set();
                const reappearSet = new Set();
                prevNames.forEach(name => {
                    if (currentNames.includes(name)) keepSet.add(name);
                    else reappearSet.add(name);
                });

                renderCards(prevNames, {
                    qualifySet: keepSet,
                    reappearSet: reappearSet,
                    skipLayout: false,
                });
                state.currentRound = to;
                updateRoundUI();

                setTimeout(() => {
                    const normalQualify = new Set(prevNames);
                    renderCards(prevNames, {
                        qualifySet: normalQualify,
                        skipLayout: false,
                    });
                    state.isAnimating = false;
                    updateRoundUI();
                }, 900);
            }

            // =================================================================
            //  自动播放控制
            // =================================================================
            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;

                // 如果已完成，重置到第一场
                if (state.isFinished) {
                    state.isFinished = false;
                    state.currentRound = 0;
                    renderCurrentRound();
                    updateRoundUI();
                    // 延迟一点再启动播放
                    setTimeout(() => {
                        if (!state.isAutoPlaying && !state.isAnimating) {
                            startAutoPlayInternal();
                        }
                    }, 300);
                    return;
                }

                // 如果已经在最后一场但未标记完成（边缘情况），重置
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    updateRoundUI();
                    return;
                }

                startAutoPlayInternal();
            }

            function startAutoPlayInternal() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    updateRoundUI();
                    return;
                }

                state.isAutoPlaying = true;
                state.isFinished = false;
                updateRoundUI();

                setTimeout(() => {
                    if (state.isAutoPlaying) {
                        autoPlayStep();
                    }
                }, 400);
            }

            function stopAutoPlay() {
                state.isAutoPlaying = false;
                if (state.autoPlayTimer) {
                    clearTimeout(state.autoPlayTimer);
                    state.autoPlayTimer = null;
                }
                updateRoundUI();
            }

            function autoPlayStep() {
                if (!state.isAutoPlaying) return;
                if (state.isAnimating) {
                    state.autoPlayTimer = setTimeout(autoPlayStep, 300);
                    return;
                }
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    state.isAutoPlaying = false;
                    updateRoundUI();
                    return;
                }

                playQualifyEffect();

                const checkDone = () => {
                    if (!state.isAnimating) {
                        if (state.isAutoPlaying && state.currentRound < TOTAL_ROUNDS - 1) {
                            state.autoPlayTimer = setTimeout(autoPlayStep, AUTO_PAUSE_MS);
                        } else if (state.isAutoPlaying && state.currentRound >= TOTAL_ROUNDS - 1) {
                            state.isFinished = true;
                            state.isAutoPlaying = false;
                            updateRoundUI();
                        } else {
                            // 如果被外部停止，清理
                            if (!state.isAutoPlaying) {
                                updateRoundUI();
                            }
                        }
                    } else {
                        state.autoPlayTimer = setTimeout(checkDone, 300);
                    }
                };
                state.autoPlayTimer = setTimeout(checkDone, 1200);
            }

            // =================================================================
            //  重置到第一场（刷新页面等价）
            // =================================================================
            function resetToFirst() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                state.currentRound = 0;
                state.isFinished = false;
                renderCurrentRound();
                updateRoundUI();
            }

            // =================================================================
            //  窗口大小变化处理
            // =================================================================
            let resizeTimer = null;

            function handleResize() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (!state.isAnimating) {
                        const names = FIXED_ROUNDS[state.currentRound];
                        const cards = grid.querySelectorAll('.name-card');
                        if (cards.length > 0 && cards.length === names.length) {
                            const cardArray = Array.from(cards);
                            const classMap = {};
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                classMap[name] = {
                                    qualify: c.classList.contains('qualify'),
                                    eliminate: c.classList.contains('eliminate'),
                                    reappear: c.classList.contains('reappear'),
                                    glow: c.classList.contains('qualify-glow'),
                                };
                            });
                            applyScatterLayout(grid, cardArray, names.length);
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                const cls = classMap[name] || {};
                                c.className = 'name-card';
                                if (cls.qualify) c.classList.add('qualify');
                                if (cls.eliminate) c.classList.add('eliminate');
                                if (cls.reappear) c.classList.add('reappear');
                                if (cls.glow) c.classList.add('qualify-glow');
                            });
                        }
                    }
                    resizeTimer = null;
                }, 300);
            }

            // =================================================================
            //  键盘事件
            // =================================================================
            function onKeyDown(e) {
                // 空格键触发自动播放（如果已播放完成则重新开始）
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (state.isAutoPlaying) return; // 播放中忽略
                    if (state.isAnimating) return;
                    startAutoPlay();
                }
                // R键重置（方便调试）
                if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    resetToFirst();
                }
            }

            // =================================================================
            //  初始化
            // =================================================================
            function init() {
                initDots();
                renderCurrentRound();
                updateRoundUI();

                autoBtn.addEventListener('click', startAutoPlay);

                document.addEventListener('keydown', onKeyDown);
                window.addEventListener('resize', handleResize);

                console.log(`🇦🇷 阿根廷观赛晋级 (大屏版) 已启动，共 ${TOTAL_ROUNDS} 场`);
                console.log('📋 各场人数:', FIXED_ROUNDS.map(r => r.length).join(' → '));
                console.log(`⏸️ 自动播放每次晋级后暂停 ${AUTO_PAUSE_SECONDS} 秒`);
                console.log('⌨️  空格键 = 自动播放  |  R键 = 重置到第一场');
                console.log('🔄 刷新页面 = 完全初始化');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

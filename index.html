<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA 2026 · 我是全勤王</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #6CB4EE 0%, #D6EAF8 50%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3.5vh 3.5vw;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 6vw,
                    rgba(108, 180, 238, 0.03) 6vw,
                    rgba(108, 180, 238, 0.03) 12vw);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 主容器 ===== */
        #app {
            width: 86vw;
            max-width: 86vw;
            height: 84vh;
            max-height: 84vh;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 2.4vw;
            padding: 2.6vh 3.0vw 1.6vh;
            box-shadow: 0 2.5vh 7vh rgba(0, 40, 80, 0.15), 0 0 0 0.15vw rgba(108, 180, 238, 0.10);
            border: 0.12vw solid rgba(255, 255, 255, 0.25);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5vh;
            padding-bottom: 0.5vh;
            border-bottom: 0.12vw solid rgba(108, 180, 238, 0.15);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            flex-direction: column;
            gap: 0.1vh;
        }
        .logo .title-row {
            display: flex;
            align-items: center;
            gap: 0.8vw;
        }
        .logo .title-row .flag-img {
            height: 3.4vh;
            width: auto;
            display: block;
            border-radius: 0.2vw;
            box-shadow: 0 0.1vw 0.4vw rgba(0, 0, 0, 0.08);
        }
        .logo h1 {
            font-size: 2.4vw;
            font-weight: 800;
            color: #1A3A5C;
            letter-spacing: 0.06vw;
            line-height: 1.2;
        }
        .logo h1 .highlight {
            color: #2E86C1;
        }
        .logo .sub {
            font-size: 1.6vw;
            color: #4A7A9C;
            letter-spacing: 0.25vw;
            font-weight: 500;
            margin-top: -0.1vh;
        }

        .round-badge {
            display: flex;
            align-items: center;
            gap: 1.0vw;
            background: rgba(108, 180, 238, 0.10);
            padding: 0.3vh 1.6vw 0.3vh 1.8vw;
            border-radius: 4vw;
            border: 0.10vw solid rgba(108, 180, 238, 0.16);
            font-size: 0.90vw;
            flex-shrink: 0;
        }
        .round-badge .label {
            color: #1A3A5C;
            font-weight: 600;
            letter-spacing: 0.06vw;
        }
        .round-badge .round-num {
            font-size: 2.0vw;
            font-weight: 800;
            color: #1A3A5C;
            min-width: 2.0vw;
            text-align: center;
            transition: 0.3s;
        }
        .round-badge .round-num.active {
            color: #2E86C1;
            text-shadow: 0 0 1.5vw rgba(46, 134, 193, 0.20);
        }
        .round-badge .total {
            color: #4A7A9C;
            font-size: 1.1vw;
            font-weight: 500;
        }
        .round-badge .people-count {
            color: #1A3A5C;
            font-size: 1.0vw;
            background: rgba(108, 180, 238, 0.12);
            padding: 0.1vh 0.9vw;
            border-radius: 2vw;
            font-weight: 600;
            margin-left: 0.1vw;
        }

        /* ===== 统计条 ===== */
        .stats-bar {
            display: flex;
            gap: 1.6vw;
            margin-bottom: 0.5vh;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.30);
            padding: 0.2vh 1.0vw;
            border-radius: 1.2vw;
            backdrop-filter: blur(4px);
            border: 0.06vw solid rgba(108, 180, 238, 0.06);
            flex-shrink: 0;
            font-size: 0.90vw;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 0.35vw;
            color: #1A3A5C;
            font-weight: 500;
        }
        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 1.4vw;
            color: #1A3A5C;
            min-width: 1.5vw;
            text-align: center;
        }
        .stats-bar .stat-item .num.qualify-num {
            color: #2E86C1;
        }
        .stats-bar .stat-item .num.eliminate-num {
            color: #E74C3C;
        }
        .stats-bar .stat-divider {
            width: 0.06vw;
            background: rgba(108, 180, 238, 0.10);
        }

        /* ===== 名字网格 ===== */
        #nameGrid {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            padding: 0.8vh 0.6vw 0.4vh;
            border-radius: 1.4vw;
            background: rgba(255, 255, 255, 0.06);
            border: 0.06vw solid rgba(108, 180, 238, 0.03);
            overflow: hidden;
        }

        /* ===== 名字卡片 ===== */
        .name-card {
            position: absolute;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.3vh 1.2vw;
            height: 3.8vh;
            min-height: 28px;
            border-radius: 0.9vw;
            background: rgba(255, 255, 255, 0.88);
            border: 0.10vw solid rgba(108, 180, 238, 0.26);
            color: #1A3A5C;
            font-size: 1.4vw;
            font-weight: 500;
            transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.4s ease,
                background 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease,
                opacity 0.5s ease;
            cursor: default;
            user-select: none;
            box-shadow: 0 0.12vw 0.6vw rgba(0, 40, 80, 0.04);
            white-space: nowrap;
            z-index: 1;
            will-change: left, top, transform;
            letter-spacing: 0.03vw;
            width: auto;
            max-width: none;
            overflow: visible;
            gap: 0.4vw;
        }

        .name-card:hover {
            transform: scale(1.08) rotate(0deg) !important;
            border-color: #2E86C1;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 0.5vw 2.0vw rgba(46, 134, 193, 0.14);
            z-index: 100;
        }

        /* ===== 头像样式 ===== */
        .name-card .avatar {
            width: 2.6vh;
            height: 2.6vh;
            min-width: 2.6vh;
            min-height: 2.6vh;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 0.10vw solid rgba(108, 180, 238, 0.20);
            background: rgba(200, 220, 240, 0.20);
            display: inline-block;
            opacity: 0;
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.6);
        }

        .name-card .avatar.show {
            opacity: 1;
            transform: scale(1);
        }

        .name-card .avatar.hidden {
            display: none;
        }

        .name-card .avatar-placeholder {
            width: 2.6vh;
            height: 2.6vh;
            min-width: 2.6vh;
            min-height: 2.6vh;
            border-radius: 50%;
            flex-shrink: 0;
            background: rgba(200, 220, 240, 0.20);
            border: 0.10vw solid rgba(108, 180, 238, 0.10);
            display: inline-block;
        }

        .name-card .name-text {
            display: inline-block;
        }

        /* ---- 晋级 ---- */
        .name-card.qualify {
            background: rgba(46, 134, 193, 0.12);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 1.8vw rgba(46, 134, 193, 0.08), inset 0 0 1.4vw rgba(46, 134, 193, 0.03);
            animation: qualifyPulse 1.2s ease-in-out;
            z-index: 10;
        }
        @keyframes qualifyPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            30% {
                transform: scale(1.10);
                box-shadow: 0 0 3.5vw rgba(46, 134, 193, 0.25);
                border-color: #2E86C1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 1.8vw rgba(46, 134, 193, 0.08);
            }
        }
        .name-card.qualify .check-mark {
            display: inline-block;
            margin-left: 0.30vw;
            font-size: 0.9vw;
            color: #2E86C1;
        }

        /* ---- 淘汰 ---- */
        .name-card.eliminate {
            background: rgba(231, 76, 60, 0.06);
            border-color: rgba(231, 76, 60, 0.18);
            color: #C0392B;
            animation: eliminateFade 0.9s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes eliminateFade {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(231, 76, 60, 0.06);
            }
            40% {
                transform: scale(0.78);
                opacity: 0.7;
                background: rgba(231, 76, 60, 0.14);
            }
            100% {
                transform: scale(0.30) translateY(4vh);
                opacity: 0;
                background: rgba(231, 76, 60, 0);
                border-color: transparent;
            }
        }

        /* ---- 回归 ---- */
        .name-card.reappear {
            animation: reappearUp 0.8s ease-out forwards;
            z-index: 8;
        }
        @keyframes reappearUp {
            0% {
                transform: translateY(5vh) scale(0.50);
                opacity: 0;
                background: rgba(46, 134, 193, 0.04);
            }
            60% {
                transform: translateY(-0.3vh) scale(1.04);
                opacity: 1;
                background: rgba(46, 134, 193, 0.10);
                border-color: rgba(46, 134, 193, 0.26);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                background: rgba(255, 255, 255, 0.88);
                border-color: rgba(108, 180, 238, 0.26);
                color: #1A3A5C;
            }
        }

        /* ---- 晋级高亮 ---- */
        .name-card.qualify-glow {
            background: rgba(46, 134, 193, 0.16);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 4.0vw rgba(46, 134, 193, 0.18), inset 0 0 2.0vw rgba(46, 134, 193, 0.05);
            animation: glowBlue 1.5s ease-in-out;
            z-index: 20;
        }
        @keyframes glowBlue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            25% {
                transform: scale(1.14);
                box-shadow: 0 0 6vw rgba(46, 134, 193, 0.35);
            }
            60% {
                transform: scale(0.94);
                box-shadow: 0 0 2.5vw rgba(46, 134, 193, 0.12);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 4.0vw rgba(46, 134, 193, 0.08);
            }
        }

        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4A7A9C;
            font-size: 1.8vw;
            letter-spacing: 0.15vw;
        }

        /* ===== 底部鸣谢 ===== */
        footer {
            flex-shrink: 0;
            margin-top: 0.5vh;
            padding-top: 0.4vh;
            border-top: 0.08vw solid rgba(108, 180, 238, 0.10);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .footer-credit {
            font-size: 1.0vw;
            color: rgba(26, 58, 92, 0.45);
            letter-spacing: 0.15vw;
            font-weight: 400;
            user-select: none;
            text-align: center;
        }
        .footer-credit .heart {
            color: #E74C3C;
            font-weight: 300;
        }

        /* ===== 工具类 ===== */
        .stat-item .num.pop {
            animation: popNum 0.5s ease;
        }
        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.35);
                color: #2E86C1;
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== 滚动条隐藏 ===== */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1200px) {
            #app {
                width: 90vw;
                height: 88vh;
                padding: 2.0vh 2.4vw 1.4vh;
            }
            .logo h1 {
                font-size: 2.8vw;
            }
            .logo .sub {
                font-size: 1.8vw;
            }
            .name-card {
                font-size: 1.6vw;
                height: 3.6vh;
                padding: 0.3vh 1.0vw;
            }
            .name-card .avatar {
                width: 2.4vh;
                height: 2.4vh;
                min-width: 2.4vh;
                min-height: 2.4vh;
            }
            .footer-credit {
                font-size: 1.1vw;
            }
        }

        @media (max-width: 768px) {
            #app {
                width: 94vw;
                height: auto;
                min-height: 86vh;
                padding: 1.4vh 1.8vw 1.0vh;
                border-radius: 3vw;
            }
            .logo h1 {
                font-size: 3.6vw;
            }
            .logo .sub {
                font-size: 2.4vw;
            }
            .logo .title-row .flag-img {
                height: 2.8vh;
            }
            .round-badge {
                font-size: 1.4vw;
                padding: 0.2vh 1.2vw;
                gap: 0.8vw;
            }
            .round-badge .round-num {
                font-size: 3.0vw;
                min-width: 2.8vw;
            }
            .stats-bar {
                font-size: 1.4vw;
                gap: 1.2vw;
                padding: 0.15vh 0.8vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.0vw;
            }
            .name-card {
                font-size: 2.0vw;
                height: 3.2vh;
                padding: 0.2vh 0.9vw;
                border-radius: 1.2vw;
                min-height: 24px;
                gap: 0.3vw;
            }
            .name-card .avatar {
                width: 2.2vh;
                height: 2.2vh;
                min-width: 2.2vh;
                min-height: 2.2vh;
            }
            #nameGrid {
                padding: 0.6vh 0.4vw;
                min-height: 180px;
            }
            .footer-credit {
                font-size: 1.4vw;
            }
        }

        @media (max-width: 480px) {
            #app {
                padding: 0.8vh 1.0vw 0.6vh;
                border-radius: 2.5vw;
            }
            .logo h1 {
                font-size: 4.4vw;
            }
            .logo .sub {
                font-size: 2.8vw;
            }
            .logo .title-row .flag-img {
                height: 2.4vh;
            }
            .round-badge {
                font-size: 1.8vw;
                padding: 0.1vh 1.0vw;
                gap: 0.6vw;
            }
            .round-badge .round-num {
                font-size: 3.6vw;
                min-width: 3.4vw;
            }
            .stats-bar {
                font-size: 1.8vw;
                gap: 1.0vw;
                padding: 0.1vh 0.6vw;
            }
            .stats-bar .stat-item .num {
                font-size: 2.4vw;
                min-width: 2.0vw;
            }
            .name-card {
                font-size: 2.4vw;
                height: 2.8vh;
                padding: 0.1vh 0.7vw;
                border-radius: 1.2vw;
                min-height: 20px;
                gap: 0.2vw;
            }
            .name-card .avatar {
                width: 2.0vh;
                height: 2.0vh;
                min-width: 2.0vh;
                min-height: 2.0vh;
            }
            #nameGrid {
                padding: 0.3vh 0.3vw;
                min-height: 140px;
            }
            .footer-credit {
                font-size: 1.8vw;
            }
        }
    </style>
</head>

                    "A", "张誉", "烟枪", "沐沐小无邪", "28号zz", "史涛维", "胡嵩",
                    "秋天的丝瓜", "流浪猫", "Arhbo", "锡锅", "🇦🇷kun", "🙊陈聘聘",
                    "🐑雨点", "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第五场（18人）
                [
                    "A", "张誉", "烟枪", "沐沐小无邪", "28号zz", "史涛维", "胡嵩",
                    "流浪猫", "Arhbo", "锡锅", "🇦🇷kun", "🙊陈聘聘",
                    "🐑雨点", "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第六场（18人）
                [
                    "A", "张誉", "烟枪", "沐沐小无邪", "28号zz", "史涛维", "胡嵩",
                    "流浪猫", "Arhbo", "锡锅", "🇦🇷kun", "🙊陈聘聘",
                    "🐑雨点", "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第七场（16人）
                [
                    "A", "烟枪", "沐沐小无邪", "28号zz", "胡嵩", "流浪猫",
                    "Arhbo", "锡锅", "🇦🇷kun", "🙊陈聘聘", "🐑雨点",
                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ],
                // 第八场（16人，最终获奖者）
                [
                    "A", "烟枪", "沐沐小无邪", "28号zz", "胡嵩", "流浪猫",
                    "Arhbo", "锡锅", "🇦🇷kun", "🙊陈聘聘", "🐑雨点",
                    "潇潇暮雨", "Lesliexscape🧀", "小王哥", "张迪", "杨文"
                ]
            ];

            // =================================================================
            //  状态
            // =================================================================
            const TOTAL_ROUNDS = FIXED_ROUNDS.length;
            const AUTO_PAUSE_MS = AUTO_PAUSE_SECONDS * 1000;

            const state = {
                currentRound: 0,
                isAnimating: false,
                autoPlayTimer: null,
                isAutoPlaying: false,
                isFinished: false,
                hasStarted: false,
                avatarsShown: false,
                avatarTimer: null,
            };

            // =================================================================
            //  DOM 引用
            // =================================================================
            const grid = document.getElementById('nameGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const totalDisplay = document.getElementById('totalDisplay');
            const peopleCountDisplay = document.getElementById('peopleCountDisplay');
            const currentCountNum = document.getElementById('currentCountNum');
            const qualifyCountNum = document.getElementById('qualifyCountNum');
            const eliminateCountNum = document.getElementById('eliminateCountNum');

            // =================================================================
            //  布局算法
            // =================================================================
            function applyScatterLayout(container, cards, count) {
                if (!cards || cards.length === 0) return;

                const rect = container.getBoundingClientRect();
                let w = rect.width || container.clientWidth || 800;
                let h = rect.height || container.clientHeight || 500;

                const pad = Math.min(w * 0.022, 42);
                w = Math.max(w - pad * 2, 160);
                h = Math.max(h - pad * 2, 160);

                const density = Math.min(count / 80, 1);
                const scaleFactor = 0.44 + density * 0.42;
                const areaW = w * scaleFactor;
                const areaH = h * scaleFactor;
                const offsetX = (w - areaW) / 2 + pad;
                const offsetY = (h - areaH) / 2 + pad;

                const aspect = areaW / areaH;
                let cols = Math.ceil(Math.sqrt(count * aspect));
                let rows = Math.ceil(count / cols);
                cols = Math.max(cols, 1);
                rows = Math.max(rows, 1);

                const spacingFactor = Math.max(1, 1 + (20 - Math.min(count, 20)) * 0.04);
                const cellW = areaW / (cols + 0.5 * spacingFactor);
                const cellH = areaH / (rows + 0.5 * spacingFactor);

                const offsetScale = Math.min(1, count / 25);
                const randOffsetX = Math.min(cellW * 0.32 * offsetScale, 36);
                const randOffsetY = Math.min(cellH * 0.32 * offsetScale, 36);

                const cardData = cards.map((card) => {
                    const cw = card.offsetWidth || 64;
                    const ch = card.offsetHeight || 30;
                    return { el: card, w: cw, h: ch };
                });

                const positions = [];
                for (let i = 0; i < cardData.length; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    let baseX = offsetX + (col + 0.5) * cellW;
                    let baseY = offsetY + (row + 0.5) * cellH;
                    let shiftX = (Math.random() - 0.5) * randOffsetX * 2;
                    let shiftY = (Math.random() - 0.5) * randOffsetY * 2;
                    const maxShiftX = Math.min(cellW * 0.30 * offsetScale, 32);
                    const maxShiftY = Math.min(cellH * 0.30 * offsetScale, 32);
                    shiftX = Math.max(-maxShiftX, Math.min(maxShiftX, shiftX));
                    shiftY = Math.max(-maxShiftY, Math.min(maxShiftY, shiftY));

                    let x = baseX + shiftX;
                    let y = baseY + shiftY;
                    const cw = cardData[i].w;
                    const ch = cardData[i].h;
                    x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x));
                    y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y));
                    const rot = (Math.random() - 0.5) * 10 * offsetScale;
                    positions.push({
                        x: x - cw / 2,
                        y: y - ch / 2,
                        rot: rot,
                        w: cw,
                        h: ch,
                        idx: i
                    });
                }

                // 防重叠
                for (let iter = 0; iter < 8; iter++) {
                    let anyOverlap = false;
                    for (let i = 0; i < positions.length; i++) {
                        for (let j = i + 1; j < positions.length; j++) {
                            const a = positions[i];
                            const b = positions[j];
                            const overlapX = (a.x < b.x + b.w && b.x < a.x + a.w);
                            const overlapY = (a.y < b.y + b.h && b.y < a.y + a.h);
                            if (overlapX && overlapY) {
                                anyOverlap = true;
                                const overlapXAmount = Math.min(a.x + a.w - b.x, b.x + b.w - a.x);
                                const overlapYAmount = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);
                                if (overlapXAmount < overlapYAmount) {
                                    const dx = (overlapXAmount * 0.5 + 2) * (a.x < b.x ? -1 : 1);
                                    a.x += dx;
                                    b.x -= dx;
                                } else {
                                    const dy = (overlapYAmount * 0.5 + 2) * (a.y < b.y ? -1 : 1);
                                    a.y += dy;
                                    b.y -= dy;
                                }
                                const a_cw = a.w,
                                    a_ch = a.h;
                                a.x = Math.max(pad, Math.min(w - a_cw - pad, a.x));
                                a.y = Math.max(pad, Math.min(h - a_ch - pad, a.y));
                                const b_cw = b.w,
                                    b_ch = b.h;
                                b.x = Math.max(pad, Math.min(w - b_cw - pad, b.x));
                                b.y = Math.max(pad, Math.min(h - b_ch - pad, b.y));
                            }
                        }
                    }
                    if (!anyOverlap) break;
                }

                for (let i = 0; i < cardData.length; i++) {
                    const card = cardData[i].el;
                    const pos = positions[i];
                    card.style.left = pos.x + 'px';
                    card.style.top = pos.y + 'px';
                    card.style.transform = `rotate(${pos.rot}deg)`;
                    card.style.position = 'absolute';
                    card.style.margin = '0';
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                }

                const maxBottom = positions.reduce((max, p) => Math.max(max, p.y + p.h), 0);
                const newHeight = Math.max(maxBottom + pad, 160);
                container.style.minHeight = newHeight + 'px';
                container.style.height = 'auto';
            }

            // =================================================================
            //  构建卡片内容（头像 + 名字）
            // =================================================================
            function buildCardContent(name, showAvatar) {
                const fragment = document.createDocumentFragment();

                if (showAvatar) {
                    const avatar = document.createElement('img');
                    avatar.className = 'avatar';
                    avatar.src = `assets/avatars/${name}.jpg`;
                    avatar.alt = '';
                    avatar.dataset.name = name;
                    avatar.onerror = function() {
                        this.classList.add('hidden');
                        const placeholder = document.createElement('span');
                        placeholder.className = 'avatar-placeholder';
                        this.parentNode.insertBefore(placeholder, this);
                    };
                    fragment.appendChild(avatar);
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'name-text';
                nameSpan.textContent = name;
                fragment.appendChild(nameSpan);

                return fragment;
            }

            // =================================================================
            //  逐个显示头像（顺序随机）
            // =================================================================
            function showAvatarsSequentially() {
                if (state.avatarTimer) {
                    clearTimeout(state.avatarTimer);
                    state.avatarTimer = null;
                }

                // 获取所有卡片中的头像
                const cards = grid.querySelectorAll('.name-card');
                const avatarItems = [];
                cards.forEach(card => {
                    const avatar = card.querySelector('.avatar');
                    if (avatar && !avatar.classList.contains('hidden')) {
                        avatarItems.push({
                            card: card,
                            avatar: avatar
                        });
                    }
                });

                if (avatarItems.length === 0) return;

                // 随机打乱顺序（Fisher-Yates）
                for (let i = avatarItems.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [avatarItems[i], avatarItems[j]] = [avatarItems[j], avatarItems[i]];
                }

                state.avatarsShown = true;
                let index = 0;

                function showNext() {
                    if (index >= avatarItems.length) {
                        state.avatarTimer = null;
                        return;
                    }
                    const item = avatarItems[index];
                    // 添加 show 类触发动画
                    item.avatar.classList.add('show');
                    // 确保头像可见
                    item.avatar.style.opacity = '1';
                    item.avatar.style.transform = 'scale(1)';
                    index++;
                    state.avatarTimer = setTimeout(showNext, AVATAR_INTERVAL_MS);
                }

                // 延迟一点点开始，确保 DOM 已完全更新
                state.avatarTimer = setTimeout(showNext, 200);
            }

            // =================================================================
            //  渲染
            // =================================================================
            function renderCards(names, options = {}) {
                const {
                    qualifySet = new Set(),
                        eliminateSet = new Set(),
                        reappearSet = new Set(),
                        extraClass = '',
                        skipLayout = false,
                        showAvatars = false,
                } = options;

                // ---- 更新模式 ----
                if (skipLayout && grid.children.length > 0) {
                    const existing = new Map();
                    for (const child of grid.children) {
                        const name = child.dataset.name;
                        if (name) existing.set(name, child);
                    }
                    const newSet = new Set(names);

                    for (const [name, el] of existing) {
                        if (newSet.has(name)) {
                            el.className = 'name-card';
                            // 清空内容
                            el.innerHTML = '';
                            // 重建内容（包含头像）
                            const content = buildCardContent(name, showAvatars);
                            el.appendChild(content);
                            // 添加状态类
                            if (qualifySet.has(name)) {
                                el.classList.add('qualify');
                                const mark = document.createElement('span');
                                mark.className = 'check-mark';
                                mark.textContent = ' ✓';
                                el.appendChild(mark);
                            }
                            if (eliminateSet.has(name)) {
                                el.classList.add('eliminate');
                            }
                            if (reappearSet.has(name)) {
                                el.classList.add('reappear');
                            }
                            if (extraClass) {
                                el.classList.add(extraClass);
                            }
                            // 确保位置样式保留
                            el.style.position = 'absolute';
                            el.style.visibility = 'visible';
                            el.style.opacity = '1';
                        } else {
                            el.remove();
                        }
                    }
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                // ---- 重建模式 ----
                grid.innerHTML = '';
                if (!names || names.length === 0) {
                    grid.innerHTML = '<div class="empty-hint">✨ 暂无名单</div>';
                    grid.style.minHeight = '160px';
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                const fragment = document.createDocumentFragment();
                const cards = [];
                names.forEach((name) => {
                    const card = document.createElement('div');
                    card.className = 'name-card';
                    card.dataset.name = name;

                    const content = buildCardContent(name, showAvatars);
                    card.appendChild(content);

                    if (qualifySet.has(name)) {
                        card.classList.add('qualify');
                        const mark = document.createElement('span');
                        mark.className = 'check-mark';
                        mark.textContent = ' ✓';
                        card.appendChild(mark);
                    }
                    if (eliminateSet.has(name)) {
                        card.classList.add('eliminate');
                    }
                    if (reappearSet.has(name)) {
                        card.classList.add('reappear');
                    }
                    if (extraClass) {
                        card.classList.add(extraClass);
                    }

                    card.style.opacity = '0';
                    card.style.visibility = 'hidden';
                    fragment.appendChild(card);
                    cards.push(card);
                });
                grid.appendChild(fragment);
                updateStats(names, qualifySet, eliminateSet);

                if (!skipLayout) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            cards.forEach(c => {
                                c.style.visibility = 'visible';
                                c.style.opacity = '0';
                            });
                            void grid.offsetHeight;
                            cards.forEach(c => { void c.offsetWidth; });
                            applyScatterLayout(grid, cards, names.length);
                            cards.forEach((c, i) => {
                                setTimeout(() => {
                                    c.style.opacity = '1';
                                    c.style.transition = 'opacity 0.40s ease';
                                }, i * 4 + 20);
                            });
                        });
                    });
                } else {
                    cards.forEach(c => {
                        c.style.visibility = 'visible';
                        c.style.opacity = '1';
                    });
                }
            }

            function updateStats(names, qualifySet, eliminateSet) {
                const total = names ? names.length : 0;
                currentCountNum.textContent = total;
                peopleCountDisplay.textContent = `👤 ${total}`;
                const qualifyCount = qualifySet ? qualifySet.size : 0;
                const eliminateCount = eliminateSet ? eliminateSet.size : 0;
                qualifyCountNum.textContent = qualifyCount;
                eliminateCountNum.textContent = eliminateCount;
                if (qualifyCount > 0) {
                    qualifyCountNum.classList.remove('pop');
                    void qualifyCountNum.offsetWidth;
                    qualifyCountNum.classList.add('pop');
                }
                if (eliminateCount > 0) {
                    eliminateCountNum.classList.remove('pop');
                    void eliminateCountNum.offsetWidth;
                    eliminateCountNum.classList.add('pop');
                }
            }

            function updateRoundUI() {
                const idx = state.currentRound;
                const total = TOTAL_ROUNDS;
                roundDisplay.textContent = idx + 1;
                totalDisplay.textContent = total;
                roundDisplay.classList.toggle('active', true);
            }

            function renderCurrentRound() {
                const names = FIXED_ROUNDS[state.currentRound];
                renderCards(names, {
                    qualifySet: new Set(),
                    eliminateSet: new Set(),
                    reappearSet: new Set(),
                    skipLayout: false,
                    showAvatars: false,
                });
                state.avatarsShown = false;
                if (state.avatarTimer) {
                    clearTimeout(state.avatarTimer);
                    state.avatarTimer = null;
                }
                updateRoundUI();
            }

            // =================================================================
            //  特效
            // =================================================================
            function playQualifyEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from + 1;
                if (to >= TOTAL_ROUNDS) return;

                state.isAnimating = true;

                const prevNames = FIXED_ROUNDS[from];
                const nextNames = FIXED_ROUNDS[to];
                const nextSet = new Set(nextNames);
                const qualifySet = new Set();
                const eliminateSet = new Set();
                prevNames.forEach(name => {
                    if (nextSet.has(name)) qualifySet.add(name);
                    else eliminateSet.add(name);
                });

                // 第一阶段：显示晋级/淘汰标记
                renderCards(prevNames, {
                    qualifySet,
                    eliminateSet,
                    skipLayout: true,
                    showAvatars: false,
                });

                // 第二阶段：高亮晋级名单
                setTimeout(() => {
                    const glowSet = new Set(nextNames);
                    const isFinal = (to === TOTAL_ROUNDS - 1);
                    renderCards(nextNames, {
                        qualifySet: glowSet,
                        extraClass: 'qualify-glow',
                        skipLayout: true,
                        showAvatars: false,
                    });
                    state.currentRound = to;
                    updateRoundUI();

                    // 第三阶段：恢复正常样式 + 最终场显示头像（重新布局）
                    setTimeout(() => {
                        const normalQualify = new Set(nextNames);
                        const isFinalStage = (to === TOTAL_ROUNDS - 1);

                        // 最终场使用 skipLayout: false 重新布局，给头像留空间
                        renderCards(nextNames, {
                            qualifySet: normalQualify,
                            skipLayout: !isFinalStage,
                            showAvatars: isFinalStage,
                        });

                        if (isFinalStage) {
                            // 延迟启动头像逐个显示
                            setTimeout(() => {
                                showAvatarsSequentially();
                            }, 400);
                        }

                        state.isAnimating = false;

                        if (state.currentRound >= TOTAL_ROUNDS - 1) {
                            state.isFinished = true;
                            state.isAutoPlaying = false;
                            if (state.autoPlayTimer) {
                                clearTimeout(state.autoPlayTimer);
                                state.autoPlayTimer = null;
                            }
                        } else {
                            if (state.isAutoPlaying) {
                                state.autoPlayTimer = setTimeout(autoPlayStep, AUTO_PAUSE_MS);
                            }
                        }
                    }, 1400);
                }, 1100);
            }

            // =================================================================
            //  自动播放
            // =================================================================
            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;

                if (state.isFinished) {
                    state.isFinished = false;
                    state.currentRound = 0;
                    state.avatarsShown = false;
                    if (state.avatarTimer) {
                        clearTimeout(state.avatarTimer);
                        state.avatarTimer = null;
                    }
                    renderCurrentRound();
                    updateRoundUI();
                    setTimeout(() => {
                        if (!state.isAutoPlaying && !state.isAnimating) {
                            startAutoPlayInternal();
                        }
                    }, 400);
                    return;
                }

                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    return;
                }

                startAutoPlayInternal();
            }

            function startAutoPlayInternal() {
                if (state.isAutoPlaying) return;
                if (state.isAnimating) return;
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    return;
                }

                state.isAutoPlaying = true;
                state.isFinished = false;
                state.hasStarted = true;

                setTimeout(() => {
                    if (state.isAutoPlaying) {
                        autoPlayStep();
                    }
                }, 400);
            }

            function autoPlayStep() {
                if (!state.isAutoPlaying) return;
                if (state.isAnimating) {
                    state.autoPlayTimer = setTimeout(autoPlayStep, 300);
                    return;
                }
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.isFinished = true;
                    state.isAutoPlaying = false;
                    return;
                }
                playQualifyEffect();
            }

            // =================================================================
            //  重置
            // =================================================================
            function resetToFirst() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) {
                    state.isAutoPlaying = false;
                    if (state.autoPlayTimer) {
                        clearTimeout(state.autoPlayTimer);
                        state.autoPlayTimer = null;
                    }
                }
                if (state.avatarTimer) {
                    clearTimeout(state.avatarTimer);
                    state.avatarTimer = null;
                }
                state.currentRound = 0;
                state.isFinished = false;
                state.hasStarted = false;
                state.avatarsShown = false;
                renderCurrentRound();
                updateRoundUI();
            }

            // =================================================================
            //  窗口大小变化
            // =================================================================
            let resizeTimer = null;

            function handleResize() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (!state.isAnimating) {
                        const names = FIXED_ROUNDS[state.currentRound];
                        const cards = grid.querySelectorAll('.name-card');
                        if (cards.length > 0 && cards.length === names.length) {
                            const cardArray = Array.from(cards);
                            const classMap = {};
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                classMap[name] = {
                                    qualify: c.classList.contains('qualify'),
                                    eliminate: c.classList.contains('eliminate'),
                                    reappear: c.classList.contains('reappear'),
                                    glow: c.classList.contains('qualify-glow'),
                                };
                            });
                            applyScatterLayout(grid, cardArray, names.length);
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                const cls = classMap[name] || {};
                                c.className = 'name-card';
                                if (cls.qualify) c.classList.add('qualify');
                                if (cls.eliminate) c.classList.add('eliminate');
                                if (cls.reappear) c.classList.add('reappear');
                                if (cls.glow) c.classList.add('qualify-glow');
                            });
                        }
                    }
                    resizeTimer = null;
                }, 350);
            }

            // =================================================================
            //  键盘
            // =================================================================
            function onKeyDown(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (state.isAutoPlaying) return;
                    if (state.isAnimating) return;
                    startAutoPlay();
                }
            }

            // =================================================================
            //  初始化
            // =================================================================
            function init() {
                renderCurrentRound();
                updateRoundUI();

                document.addEventListener('keydown', onKeyDown);
                window.addEventListener('resize', handleResize);

                console.log(`🇦🇷 阿根廷观赛晋级 (头像逐个随机版) 已就绪，共 ${TOTAL_ROUNDS} 场`);
                console.log('📋 各场人数:', FIXED_ROUNDS.map(r => r.length).join(' → '));
                console.log(`⏸️ 每次晋级后暂停 ${AUTO_PAUSE_SECONDS} 秒`);
                console.log(`🖼️  头像显示间隔 ${AVATAR_INTERVAL_MS}ms，顺序随机`);
                console.log('⌨️  按 空格键 开始自动播放 | 刷新页面重置');
                console.log('📁 阿根廷国旗图片: ./assets/argentina-flag.png');
                console.log('📁 头像图片: ./assets/avatars/名字.jpg');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

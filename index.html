<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🇦🇷 阿根廷 · 观赛名单晋级</title>
    <style>
        /* ===== 全局样式（主题保持不变） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #6CB4EE 0%, #D6EAF8 50%, #FFFFFF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.08) 0px,
                    rgba(255, 255, 255, 0.08) 40px,
                    rgba(108, 180, 238, 0.06) 40px,
                    rgba(108, 180, 238, 0.06) 80px);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 30px 35px 35px;
            box-shadow: 0 20px 60px rgba(0, 40, 80, 0.25), 0 0 0 1px rgba(108, 180, 238, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px solid rgba(108, 180, 238, 0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1A3A5C;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo h1 .flag {
            font-size: 32px;
        }
        .logo .sub {
            font-size: 13px;
            color: #4A7A9C;
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 500;
        }

        .round-badge {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(108, 180, 238, 0.12);
            padding: 10px 22px 10px 26px;
            border-radius: 60px;
            border: 1px solid rgba(108, 180, 238, 0.25);
        }
        .round-badge .label {
            color: #1A3A5C;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .round-badge .round-num {
            font-size: 28px;
            font-weight: 800;
            color: #1A3A5C;
            min-width: 36px;
            text-align: center;
            transition: 0.3s;
        }
        .round-badge .round-num.active {
            color: #2E86C1;
            text-shadow: 0 0 20px rgba(46, 134, 193, 0.3);
        }
        .round-badge .total {
            color: #4A7A9C;
            font-size: 16px;
            font-weight: 500;
        }
        .round-badge .people-count {
            color: #1A3A5C;
            font-size: 14px;
            background: rgba(108, 180, 238, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-left: 4px;
        }

        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(108, 180, 238, 0.15);
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #1A3A5C;
            font-weight: 500;
        }
        .stats-bar .stat-item .num {
            font-weight: 700;
            font-size: 18px;
            color: #1A3A5C;
            min-width: 28px;
            text-align: center;
        }
        .stats-bar .stat-item .num.qualify-num {
            color: #2E86C1;
        }
        .stats-bar .stat-item .num.eliminate-num {
            color: #E74C3C;
        }
        .stats-bar .stat-divider {
            width: 1px;
            background: rgba(108, 180, 238, 0.2);
        }

        /* ===== 名字网格 — 散落聚集容器 ===== */
        #nameGrid {
            position: relative;
            width: 100%;
            min-height: 480px;
            height: auto;
            padding: 10px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.20);
            border: 1px solid rgba(108, 180, 238, 0.08);
            transition: min-height 0.4s ease;
            overflow: visible;
        }

        /* ===== 名字卡片 — 绝对定位，自由散落 ===== */
        .name-card {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            min-width: 52px;
            height: 36px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(108, 180, 238, 0.30);
            color: #1A3A5C;
            font-size: 14px;
            font-weight: 500;
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.4s ease,
                background 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease,
                opacity 0.5s ease;
            cursor: default;
            user-select: none;
            box-shadow: 0 2px 8px rgba(0, 40, 80, 0.06);
            white-space: nowrap;
            z-index: 1;
            will-change: left, top, transform;
        }
        .name-card:hover {
            transform: scale(1.08) rotate(0deg) !important;
            border-color: #2E86C1;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 28px rgba(46, 134, 193, 0.20);
            z-index: 100;
        }

        .name-card.qualify {
            background: rgba(46, 134, 193, 0.14);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 25px rgba(46, 134, 193, 0.12), inset 0 0 20px rgba(46, 134, 193, 0.04);
            animation: qualifyPulse 1.2s ease-in-out;
            z-index: 10;
        }
        @keyframes qualifyPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            30% {
                transform: scale(1.14);
                box-shadow: 0 0 50px rgba(46, 134, 193, 0.35);
                border-color: #2E86C1;
            }
            70% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 25px rgba(46, 134, 193, 0.12);
            }
        }
        .name-card.qualify .check-mark {
            display: inline-block;
            margin-left: 5px;
            font-size: 12px;
            color: #2E86C1;
        }

        .name-card.eliminate {
            background: rgba(231, 76, 60, 0.08);
            border-color: rgba(231, 76, 60, 0.25);
            color: #C0392B;
            animation: eliminateFade 0.9s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes eliminateFade {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(231, 76, 60, 0.08);
            }
            40% {
                transform: scale(0.80);
                opacity: 0.8;
                background: rgba(231, 76, 60, 0.20);
            }
            100% {
                transform: scale(0.4) translateY(40px);
                opacity: 0;
                background: rgba(231, 76, 60, 0);
                border-color: transparent;
            }
        }

        .name-card.reappear {
            animation: reappearUp 0.8s ease-out forwards;
            z-index: 8;
        }
        @keyframes reappearUp {
            0% {
                transform: translateY(50px) scale(0.6);
                opacity: 0;
                background: rgba(46, 134, 193, 0.05);
            }
            60% {
                transform: translateY(-6px) scale(1.04);
                opacity: 1;
                background: rgba(46, 134, 193, 0.12);
                border-color: rgba(46, 134, 193, 0.35);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                background: rgba(255, 255, 255, 0.85);
                border-color: rgba(108, 180, 238, 0.30);
                color: #1A3A5C;
            }
        }

        .name-card.qualify-glow {
            background: rgba(46, 134, 193, 0.20);
            border-color: #2E86C1;
            color: #1A5276;
            box-shadow: 0 0 45px rgba(46, 134, 193, 0.25), inset 0 0 30px rgba(46, 134, 193, 0.08);
            animation: glowBlue 1.4s ease-in-out;
            z-index: 20;
        }
        @keyframes glowBlue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(46, 134, 193, 0);
            }
            25% {
                transform: scale(1.18);
                box-shadow: 0 0 70px rgba(46, 134, 193, 0.45);
            }
            60% {
                transform: scale(0.94);
                box-shadow: 0 0 30px rgba(46, 134, 193, 0.18);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 45px rgba(46, 134, 193, 0.15);
            }
        }

        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4A7A9C;
            font-size: 18px;
            letter-spacing: 2px;
        }

        footer {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding-top: 20px;
            border-top: 2px solid rgba(108, 180, 238, 0.2);
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 10px 28px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            color: #1A3A5C;
            border: 1px solid rgba(108, 180, 238, 0.25);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .controls button:hover:not(:disabled) {
            background: #ffffff;
            border-color: #2E86C1;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 134, 193, 0.15);
        }
        .controls button:active:not(:disabled) {
            transform: scale(0.96);
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .controls button.primary {
            background: linear-gradient(135deg, #2E86C1, #1A5276);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(46, 134, 193, 0.3);
        }
        .controls button.primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #3498DB, #1A5276);
            box-shadow: 0 8px 35px rgba(46, 134, 193, 0.4);
            transform: translateY(-2px);
        }
        .controls button.primary:disabled {
            background: rgba(108, 180, 238, 0.3);
            color: rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }
        .controls button .icon {
            font-size: 18px;
            line-height: 1;
        }
        .controls button .badge {
            background: rgba(108, 180, 238, 0.15);
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #1A3A5C;
        }
        .controls button.primary .badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .progress-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .progress-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(108, 180, 238, 0.25);
            transition: all 0.4s ease;
            border: 1px solid rgba(108, 180, 238, 0.2);
        }
        .progress-dots .dot.active {
            background: #2E86C1;
            box-shadow: 0 0 20px rgba(46, 134, 193, 0.4);
            border-color: #2E86C1;
            transform: scale(1.3);
        }
        .progress-dots .dot.done {
            background: rgba(46, 134, 193, 0.3);
            border-color: rgba(46, 134, 193, 0.2);
        }

        @media (max-width: 768px) {
            #app {
                padding: 18px 16px 22px;
                border-radius: 28px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .round-badge {
                padding: 8px 14px 8px 18px;
                gap: 10px;
            }
            .round-badge .round-num {
                font-size: 22px;
                min-width: 28px;
            }
            .round-badge .people-count {
                font-size: 12px;
                padding: 2px 10px;
            }
            .stats-bar {
                gap: 14px;
                margin-bottom: 14px;
                padding: 8px 14px;
            }
            .stats-bar .stat-item {
                font-size: 12px;
            }
            .stats-bar .stat-item .num {
                font-size: 15px;
                min-width: 20px;
            }
            #nameGrid {
                min-height: 360px;
                padding: 6px;
            }
            .name-card {
                padding: 4px 12px;
                min-width: 40px;
                height: 30px;
                font-size: 12px;
                border-radius: 8px;
            }
            .controls button {
                padding: 8px 18px;
                font-size: 13px;
            }
            .controls button .badge {
                display: none;
            }
            .progress-dots .dot {
                width: 8px;
                height: 8px;
            }
            footer {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .controls {
                justify-content: center;
            }
            .progress-dots {
                justify-content: center;
            }
        }
        @media (max-width: 480px) {
            #nameGrid {
                min-height: 280px;
                padding: 4px;
            }
            .name-card {
                padding: 3px 10px;
                min-width: 32px;
                height: 26px;
                font-size: 10px;
                border-radius: 6px;
            }
            .controls button {
                padding: 6px 14px;
                font-size: 12px;
            }
            .round-badge .label {
                font-size: 11px;
            }
            .round-badge .round-num {
                font-size: 18px;
                min-width: 22px;
            }
        }

        .stat-item .num.pop {
            animation: popNum 0.5s ease;
        }
        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
                color: #2E86C1;
            }
            100% {
                transform: scale(1);
            }
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(108, 180, 238, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2E86C1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1A5276;
        }
    </style>
</head>

            ];

            // =================================================================
            //  状态管理
            // =================================================================
            const TOTAL_ROUNDS = FIXED_ROUNDS.length;
            const AUTO_PAUSE_MS = AUTO_PAUSE_SECONDS * 1000;

            const state = {
                currentRound: 0,
                isAnimating: false,
                autoPlayTimer: null,
                isAutoPlaying: false,
            };

            // =================================================================
            //  DOM 引用
            // =================================================================
            const grid = document.getElementById('nameGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const totalDisplay = document.getElementById('totalDisplay');
            const peopleCountDisplay = document.getElementById('peopleCountDisplay');
            const currentCountNum = document.getElementById('currentCountNum');
            const qualifyCountNum = document.getElementById('qualifyCountNum');
            const eliminateCountNum = document.getElementById('eliminateCountNum');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const autoBtn = document.getElementById('autoBtn');
            const resetBtn = document.getElementById('resetBtn');
            const prevBadge = document.getElementById('prevBadge');
            const nextBadge = document.getElementById('nextBadge');
            const progressDots = document.getElementById('progressDots');

            // =================================================================
            //  布局算法（散落聚集）
            // =================================================================
            function applyScatterLayout(container, cards, count) {
                if (!cards || cards.length === 0) return;

                const rect = container.getBoundingClientRect();
                let w = rect.width || container.clientWidth || 800;
                let h = rect.height || container.clientHeight || 500;
                const pad = 20;
                w = Math.max(w - pad * 2, 200);
                h = Math.max(h - pad * 2, 200);

                // 聚集区域系数，人数越多越分散
                const density = Math.min(count / 80, 1);
                const scaleFactor = 0.50 + density * 0.35;
                const areaW = w * scaleFactor;
                const areaH = h * scaleFactor;
                const offsetX = (w - areaW) / 2 + pad;
                const offsetY = (h - areaH) / 2 + pad;

                // 计算网格
                const aspect = areaW / areaH;
                let cols = Math.ceil(Math.sqrt(count * aspect));
                let rows = Math.ceil(count / cols);
                cols = Math.max(cols, 1);
                rows = Math.max(rows, 1);

                const cellW = areaW / (cols + 0.6);
                const cellH = areaH / (rows + 0.6);
                const randOffsetX = Math.min(cellW * 0.35, 40);
                const randOffsetY = Math.min(cellH * 0.35, 40);

                // 测量卡片尺寸
                const cardData = cards.map((card, i) => {
                    const cw = card.offsetWidth || 60;
                    const ch = card.offsetHeight || 32;
                    return { el: card, w: cw, h: ch };
                });

                const positions = [];
                for (let i = 0; i < cardData.length; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    let baseX = offsetX + (col + 0.5) * cellW;
                    let baseY = offsetY + (row + 0.5) * cellH;
                    let shiftX = (Math.random() - 0.5) * randOffsetX * 2;
                    let shiftY = (Math.random() - 0.5) * randOffsetY * 2;
                    // 限制偏移
                    const maxShiftX = Math.min(cellW * 0.3, 30);
                    const maxShiftY = Math.min(cellH * 0.3, 30);
                    shiftX = Math.max(-maxShiftX, Math.min(maxShiftX, shiftX));
                    shiftY = Math.max(-maxShiftY, Math.min(maxShiftY, shiftY));

                    let x = baseX + shiftX;
                    let y = baseY + shiftY;
                    const cw = cardData[i].w;
                    const ch = cardData[i].h;
                    x = Math.max(cw / 2 + pad, Math.min(w - cw / 2 - pad, x));
                    y = Math.max(ch / 2 + pad, Math.min(h - ch / 2 - pad, y));
                    const rot = (Math.random() - 0.5) * 14;
                    positions.push({
                        x: x - cw / 2,
                        y: y - ch / 2,
                        rot: rot,
                        w: cw,
                        h: ch
                    });
                }

                for (let i = 0; i < cardData.length; i++) {
                    const card = cardData[i].el;
                    const pos = positions[i];
                    card.style.left = pos.x + 'px';
                    card.style.top = pos.y + 'px';
                    card.style.transform = `rotate(${pos.rot}deg)`;
                    card.style.position = 'absolute';
                    card.style.margin = '0';
                    card.style.width = 'auto';
                    card.style.maxWidth = '160px';
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                }

                const maxBottom = positions.reduce((max, p) => Math.max(max, p.y + p.h), 0);
                const newHeight = Math.max(maxBottom + pad, 320);
                container.style.minHeight = newHeight + 'px';
                container.style.height = 'auto';
            }

            // =================================================================
            //  渲染核心（支持更新模式，避免特效时重新布局）
            // =================================================================
            function renderCards(names, options = {}) {
                const {
                    qualifySet = new Set(),
                        eliminateSet = new Set(),
                        reappearSet = new Set(),
                        extraClass = '',
                        skipLayout = false, // 为 true 时保留现有卡片位置，只更新类和内容
                } = options;

                // ---- 更新模式（保留位置） ----
                if (skipLayout && grid.children.length > 0) {
                    // 构建现有卡片映射
                    const existing = new Map();
                    for (const child of grid.children) {
                        const name = child.dataset.name;
                        if (name) existing.set(name, child);
                    }
                    const newSet = new Set(names);

                    // 更新保留的卡片，移除不在新名单中的卡片
                    for (const [name, el] of existing) {
                        if (newSet.has(name)) {
                            // 重置内容和类
                            el.className = 'name-card';
                            el.textContent = name;
                            if (qualifySet.has(name)) {
                                el.classList.add('qualify');
                                const mark = document.createElement('span');
                                mark.className = 'check-mark';
                                mark.textContent = ' ✓';
                                el.appendChild(mark);
                            }
                            if (eliminateSet.has(name)) {
                                el.classList.add('eliminate');
                            }
                            if (reappearSet.has(name)) {
                                el.classList.add('reappear');
                            }
                            if (extraClass) {
                                el.classList.add(extraClass);
                            }
                            // 位置保持不变（style 已经存在）
                        } else {
                            // 不在新名单中，移除
                            el.remove();
                        }
                    }

                    // 更新统计
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                // ---- 完全重建模式（用于初始化和切换场次） ----
                grid.innerHTML = '';
                if (!names || names.length === 0) {
                    grid.innerHTML = '<div class="empty-hint">✨ 暂无名单</div>';
                    grid.style.minHeight = '200px';
                    updateStats(names, qualifySet, eliminateSet);
                    return;
                }

                const fragment = document.createDocumentFragment();
                const cards = [];
                names.forEach(name => {
                    const card = document.createElement('div');
                    card.className = 'name-card';
                    card.textContent = name;
                    card.dataset.name = name;
                    if (qualifySet.has(name)) {
                        card.classList.add('qualify');
                        const mark = document.createElement('span');
                        mark.className = 'check-mark';
                        mark.textContent = ' ✓';
                        card.appendChild(mark);
                    }
                    if (eliminateSet.has(name)) {
                        card.classList.add('eliminate');
                    }
                    if (reappearSet.has(name)) {
                        card.classList.add('reappear');
                    }
                    if (extraClass) {
                        card.classList.add(extraClass);
                    }
                    card.style.opacity = '0';
                    card.style.visibility = 'hidden';
                    fragment.appendChild(card);
                    cards.push(card);
                });
                grid.appendChild(fragment);
                updateStats(names, qualifySet, eliminateSet);

                // 应用散落布局
                if (!skipLayout) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            cards.forEach(c => {
                                c.style.visibility = 'visible';
                                c.style.opacity = '0';
                            });
                            void grid.offsetHeight;
                            applyScatterLayout(grid, cards, names.length);
                            cards.forEach((c, i) => {
                                setTimeout(() => {
                                    c.style.opacity = '1';
                                    c.style.transition = 'opacity 0.35s ease';
                                }, i * 6 + 20);
                            });
                        });
                    });
                } else {
                    // skipLayout 为 true 但无现有卡片（极少情况），直接显示
                    cards.forEach(c => {
                        c.style.visibility = 'visible';
                        c.style.opacity = '1';
                    });
                }
            }

            // ---- 更新统计信息 ----
            function updateStats(names, qualifySet, eliminateSet) {
                const total = names ? names.length : 0;
                currentCountNum.textContent = total;
                peopleCountDisplay.textContent = `👤 ${total}`;
                const qualifyCount = qualifySet ? qualifySet.size : 0;
                const eliminateCount = eliminateSet ? eliminateSet.size : 0;
                qualifyCountNum.textContent = qualifyCount;
                eliminateCountNum.textContent = eliminateCount;
                if (qualifyCount > 0) {
                    qualifyCountNum.classList.remove('pop');
                    void qualifyCountNum.offsetWidth;
                    qualifyCountNum.classList.add('pop');
                }
                if (eliminateCount > 0) {
                    eliminateCountNum.classList.remove('pop');
                    void eliminateCountNum.offsetWidth;
                    eliminateCountNum.classList.add('pop');
                }
            }

            // =================================================================
            //  UI 更新
            // =================================================================
            function updateRoundUI() {
                const idx = state.currentRound;
                const total = TOTAL_ROUNDS;
                roundDisplay.textContent = idx + 1;
                totalDisplay.textContent = total;
                roundDisplay.classList.toggle('active', true);

                const dots = progressDots.querySelectorAll('.dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === idx);
                    dot.classList.toggle('done', i < idx);
                });

                prevBtn.disabled = idx === 0 || state.isAnimating;
                nextBtn.disabled = idx === total - 1 || state.isAnimating;
                prevBadge.textContent = idx > 0 ? FIXED_ROUNDS[idx - 1].length : '-';
                nextBadge.textContent = idx < total - 1 ? FIXED_ROUNDS[idx + 1].length : '-';

                autoBtn.innerHTML = state.isAutoPlaying ?
                    '<span class="icon">⏸</span> 暂停' :
                    '<span class="icon">▶</span> 自动播放';
            }

            function initDots() {
                progressDots.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'dot';
                    if (i === 0) dot.classList.add('active');
                    progressDots.appendChild(dot);
                }
            }

            function renderCurrentRound() {
                const names = FIXED_ROUNDS[state.currentRound];
                renderCards(names, {
                    qualifySet: new Set(),
                    eliminateSet: new Set(),
                    reappearSet: new Set(),
                    skipLayout: false, // 初始加载需要布局
                });
                updateRoundUI();
            }

            // =================================================================
            //  特效函数（全程保持位置不变）
            // =================================================================
            function playQualifyEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from + 1;
                if (to >= TOTAL_ROUNDS) return;

                state.isAnimating = true;
                nextBtn.disabled = true;
                prevBtn.disabled = true;

                const prevNames = FIXED_ROUNDS[from];
                const nextNames = FIXED_ROUNDS[to];
                const nextSet = new Set(nextNames);
                const qualifySet = new Set();
                const eliminateSet = new Set();
                prevNames.forEach(name => {
                    if (nextSet.has(name)) qualifySet.add(name);
                    else eliminateSet.add(name);
                });

                // 第一阶段：显示当前场次，标记晋级/淘汰（保留位置）
                renderCards(prevNames, {
                    qualifySet,
                    eliminateSet,
                    skipLayout: true,
                });

                // 第二阶段：只显示晋级名单，加高亮（保留位置，移除淘汰卡片）
                setTimeout(() => {
                    const glowSet = new Set(nextNames);
                    renderCards(nextNames, {
                        qualifySet: glowSet,
                        extraClass: 'qualify-glow',
                        skipLayout: true,
                    });
                    state.currentRound = to;
                    updateRoundUI();

                    // 第三阶段：移除高亮（保留位置）
                    setTimeout(() => {
                        const normalQualify = new Set(nextNames);
                        renderCards(nextNames, {
                            qualifySet: normalQualify,
                            skipLayout: true,
                        });
                        state.isAnimating = false;
                        updateRoundUI();
                    }, 1400);
                }, 1100);
            }

            function playReappearEffect() {
                if (state.isAnimating) return;
                const from = state.currentRound;
                const to = from - 1;
                if (to < 0) return;

                state.isAnimating = true;
                nextBtn.disabled = true;
                prevBtn.disabled = true;

                const prevNames = FIXED_ROUNDS[to];
                const currentNames = FIXED_ROUNDS[from];
                const keepSet = new Set();
                const reappearSet = new Set();
                prevNames.forEach(name => {
                    if (currentNames.includes(name)) keepSet.add(name);
                    else reappearSet.add(name);
                });

                // 回退时人数增加，允许重新布局
                renderCards(prevNames, {
                    qualifySet: keepSet,
                    reappearSet: reappearSet,
                    skipLayout: false,
                });
                state.currentRound = to;
                updateRoundUI();

                setTimeout(() => {
                    const normalQualify = new Set(prevNames);
                    renderCards(prevNames, {
                        qualifySet: normalQualify,
                        skipLayout: false, // 重新布局使卡片均匀分布
                    });
                    state.isAnimating = false;
                    updateRoundUI();
                }, 900);
            }

            // =================================================================
            //  交互控制
            // =================================================================
            function goToNext() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                if (state.currentRound >= TOTAL_ROUNDS - 1) return;
                playQualifyEffect();
            }

            function goToPrev() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                if (state.currentRound <= 0) return;
                playReappearEffect();
            }

            function resetToFirst() {
                if (state.isAnimating) return;
                if (state.isAutoPlaying) stopAutoPlay();
                state.currentRound = 0;
                renderCurrentRound();
                updateRoundUI();
            }

            // ---- 自动播放 ----
            function toggleAutoPlay() {
                if (state.isAutoPlaying) stopAutoPlay();
                else startAutoPlay();
            }

            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                state.isAutoPlaying = true;
                autoBtn.innerHTML = '<span class="icon">⏸</span> 暂停';
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    state.currentRound = 0;
                    renderCurrentRound();
                    updateRoundUI();
                }
                setTimeout(() => {
                    if (state.isAutoPlaying) autoPlayStep();
                }, 500);
            }

            function stopAutoPlay() {
                state.isAutoPlaying = false;
                if (state.autoPlayTimer) {
                    clearTimeout(state.autoPlayTimer);
                    state.autoPlayTimer = null;
                }
                autoBtn.innerHTML = '<span class="icon">▶</span> 自动播放';
            }

            function autoPlayStep() {
                if (!state.isAutoPlaying) return;
                if (state.isAnimating) {
                    state.autoPlayTimer = setTimeout(autoPlayStep, 300);
                    return;
                }
                if (state.currentRound >= TOTAL_ROUNDS - 1) {
                    stopAutoPlay();
                    return;
                }
                playQualifyEffect();

                const checkDone = () => {
                    if (!state.isAnimating) {
                        if (state.isAutoPlaying && state.currentRound < TOTAL_ROUNDS - 1) {
                            state.autoPlayTimer = setTimeout(autoPlayStep, AUTO_PAUSE_MS);
                        } else if (state.isAutoPlaying && state.currentRound >= TOTAL_ROUNDS - 1) {
                            stopAutoPlay();
                        }
                    } else {
                        state.autoPlayTimer = setTimeout(checkDone, 300);
                    }
                };
                state.autoPlayTimer = setTimeout(checkDone, 1200);
            }

            // =================================================================
            //  窗口大小变化处理
            // =================================================================
            let resizeTimer = null;

            function handleResize() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (!state.isAnimating) {
                        const names = FIXED_ROUNDS[state.currentRound];
                        const cards = grid.querySelectorAll('.name-card');
                        if (cards.length > 0 && cards.length === names.length) {
                            // 重新布局但不重建卡片
                            const cardArray = Array.from(cards);
                            // 保留当前类状态
                            const classMap = {};
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                classMap[name] = {
                                    qualify: c.classList.contains('qualify'),
                                    eliminate: c.classList.contains('eliminate'),
                                    reappear: c.classList.contains('reappear'),
                                    glow: c.classList.contains('qualify-glow'),
                                };
                            });
                            // 重新应用布局（会重置位置）
                            applyScatterLayout(grid, cardArray, names.length);
                            // 恢复类（但位置已更新）
                            cardArray.forEach(c => {
                                const name = c.dataset.name;
                                const cls = classMap[name] || {};
                                c.className = 'name-card';
                                if (cls.qualify) c.classList.add('qualify');
                                if (cls.eliminate) c.classList.add('eliminate');
                                if (cls.reappear) c.classList.add('reappear');
                                if (cls.glow) c.classList.add('qualify-glow');
                            });
                        }
                    }
                    resizeTimer = null;
                }, 300);
            }

            // =================================================================
            //  初始化
            // =================================================================
            function init() {
                initDots();
                renderCurrentRound();
                updateRoundUI();

                nextBtn.addEventListener('click', goToNext);
                prevBtn.addEventListener('click', goToPrev);
                resetBtn.addEventListener('click', resetToFirst);
                autoBtn.addEventListener('click', toggleAutoPlay);

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') {
                        e.preventDefault();
                        goToNext();
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        goToPrev();
                    } else if (e.key === 'r') {
                        resetToFirst();
                    }
                });

                window.addEventListener('resize', handleResize);

                console.log(`🇦🇷 阿根廷观赛晋级已启动（共 ${TOTAL_ROUNDS} 场）`);
                console.log('📋 各场人数:', FIXED_ROUNDS.map(r => r.length).join(' → '));
                console.log(`⏸️ 自动播放每次晋级后暂停 ${AUTO_PAUSE_SECONDS} 秒`);
                console.log('⌨️  快捷键: ← 上一场 | → / Space 下一场 | r 重置');
                console.log('🎯 卡片散落布局，特效时位置保持不变');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
